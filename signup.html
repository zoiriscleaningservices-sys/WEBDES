<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up</title>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <style>
    /* EXACT SAME CSS AS LOGIN */
    body {margin:0;padding:0;background:#f5f7fa;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,Cantarell,'Open Sans','Helvetica Neue',sans-serif;}
    .form {display:flex;flex-direction:column;gap:10px;background-color:#ffffff;padding:30px;width:450px;border-radius:20px;box-shadow:0 10px 40px rgba(0,0,0,.08);}
    ::placeholder {font-family:inherit;}
    .flex-column > label {color:#151717;font-weight:600;}
    .inputForm {border:1.5px solid #ecedec;border-radius:10px;height:50px;display:flex;align-items:center;padding-left:10px;transition:.2s;}
    .input {margin-left:10px;border:none;width:100%;height:100%;background:transparent;font-size:15px;}
    .input:focus {outline:none;}
    .inputForm:focus-within {border:1.5px solid #2d79f3;}
    .flex-row {display:flex;align-items:center;justify-content:space-between;}
    .span {font-size:14px;color:#2d79f3;font-weight:500;cursor:pointer;}
    .button-submit {margin:20px 0 10px;background:#151717;color:#fff;font-size:15px;font-weight:500;border:none;border-radius:10px;height:50px;width:100%;cursor:pointer;}
    .button-submit:hover {background:#2d79f3;}
    .p {text-align:center;color:black;font-size:14px;margin:5px 0;}
    .p.line {color:#aaa;}
    .btn {margin-top:10px;width:100%;height:50px;border-radius:10px;display:flex;justify-content:center;align-items:center;gap:10px;border:1px solid #ededef;background:#fff;cursor:pointer;}
    .btn:hover {border:1px solid #2d79f3;}
    .error {color:#e74c3c;text-align:center;margin-top:10px 0;}
  </style>
</head>
<body>

<form class="form">
  <h3 style="text-align:center;margin:0 0 20px;color:#151717;">Create Account</h3>

  <div class="flex-column"><label>Email </label></div>
  <div class="inputForm">
    <svg xmlns="http://www.w3.org/2000/svg" width="20" viewBox="0 0 32 32" height="20"><g><path d="m30.853 13.87a15 15 0 0 0 -29.729 4.082 15.1 15.1 0 0 0 12.876 12.918 15.6 15.6 0 0 0 2.016.13 14.85 14.85 0 0 0 7.715-2.145 1 1 0 1 0 -1.031-1.711 13.007 13.007 0 1 1 5.458-6.529 2.149 2.149 0 0 1 -4.158-.759v-10.856a1 1 0 0 0 -2 0v1.726a8 8 0 1 0 .2 10.325 4.135 4.135 0 0 0 7.83.274 15.2 15.2 0 0 0 .823-7.455zm-14.853 8.13a6 6 0 1 1 6-6 6.006 6.006 0 0 1 -6 6z"></path></g></svg>
    <input id="email" placeholder="Enter your Email" class="input" type="email" required>
  </div>

  <div class="flex-column"><label>Password </label></div>
  <div class="inputForm">
    <svg xmlns="http://www.w3.org/2000/svg" width="20" viewBox="-64 0 512 512" height="20"><path d="m336 512h-288c-26.453125 0-48-21.523438-48-48v-224c0-26.476562 21.546875-48 48-48h288c26.453125 0 48 21.523438 48 48v224c0 26.476562-21.546875 48-48 48zm-288-288c-8.8125 0-16 7.167969-16 16v224c0 8.832031 7.1875 16 16 16h288c8.8125 0 16-7.167969 16-16v-224c0-8.832031-7.1875-16-16-16zm0 0"></path><path d="m304 224c-8.832031 0-16-7.167969-16-16v-80c0-52.929688-43.070312-96-96-96s-96 43.070312-96 96v80c0 8.832031-7.167969 16-16 16s-16-7.167969-16-16v-80c0-70.59375 57.40625-128 128-128s128 57.40625 128 128v80c0 8.832031-7.167969 16-16 16zm0 0"></path></svg>
    <input id="pass" placeholder="Create Password" class="input" type="password" required>
  </div>

  <div class="flex-column"><label>Confirm Password </label></div>
  <div class="inputForm">
    <svg xmlns="http://www.w3.org/2000/svg" width="20" viewBox="-64 0 512 512" height="20"><path d="m336 512h-288c-26.453125 0-48-21.523438-48-48v-224c0-26.476562 21.546875-48 48-48h288c26.453125 0 48 21.523438 48 48v224c0 26.476562-21.546875 48-48 48zm-288-288c-8.8125 0-16 7.167969-16 16v224c0 8.832031 7.1875 16 16 16h288c8.8125 0 16-7.167969 16-16v-224c0-8.832031-7.1875-16-16-16zm0 0"></path><path d="m304 224c-8.832031 0-16-7.167969-16-16v-80c0-52.929688-43.070312-96-96-96s-96 43.070312-96 96v80c0 8.832031-7.167969 16-16 16s-16-7.167969-16-16v-80c0-70.59375 57.40625-128 128-128s128 57.40625 128 128v80c0 8.832031-7.167969 16-16 16zm0 0"></path></svg>
    <input id="confirm" placeholder="Confirm Password" class="input" type="password" required>
  </div>

  <button type="submit" class="button-submit" id="signupBtn">Sign Up</button>
  <div id="message"></div>

  <p class="p">Already have an account? <span class="span" onclick="location.href='index.html'">Sign In</span></p>
  <p class="p line">Or With</p>

  <div class="flex-row">
    <button type="button" class="btn google" id="googleSignup">
      <svg xml:space="preserve" style="enable-background:new 0 0 512 512;" viewBox="0 0 512 512" width="20" version="1.1">
        <path d="M113.47,309.408L95.648,375.94l-65.139,1.378C11.042,341.211,0,299.9,0,256 c0-42.451,10.324-82.483,28.624-117.732h0.014l57.992,10.632l25.404,57.644c-5.317,15.501-8.215,32.141-8.215,49.456 C103.821,274.792,107.225,292.797,113.47,309.408z" style="fill:#FBBB00;"></path>
        <path d="M507.527,208.176C510.467,223.662,512,239.655,512,256c0,18.328-1.927,36.206-5.598,53.451 c-12.462,58.683-45.025,109.925-90.134,146.187l-0.014-0.014l-73.044-3.727l-10.338-64.535 c29.932-17.554,53.324-45.025,65.646-77.911h-136.89V208.176h138.887z" style="fill:#518EF8;"></path>
        <path d="M416.253,455.624l0.014,0.014C372.396,490.901,316.666,512,256,512 c-97.491,0-182.252-54.491-225.491-134.681l82.961-67.91c21.619,57.698,77.278,98.771,142.53,98.771 c28.047,0,54.323-7.582,76.87-20.818z" style="fill:#28B446;"></path>
        <path d="M419.404,58.936l-82.933,67.896c-23.335-14.586-50.919-23.012-80.471-23.012 c-66.729,0-123.429,42.957-143.965,102.724l-83.397-68.276h-0.014C71.23,56.123,157.06,0,256,0 C318.115,0,375.068,22.126,419.404,58.936z" style="fill:#F14336;"></path>
      </svg>
      Google
    </button>
  </div>
</form>

<script>
  const firebaseConfig = { /* same as above */ 
    apiKey: "AIzaSyAHZ5v86FWK9uU-9LfZKaBsMR6QQ92JqQM",
    authDomain: "truewebx-78890.firebaseapp.com",
    projectId: "truewebx-78890",
    storageBucket: "truewebx-78890.firebasestorage.app",
    messagingSenderId: "578628752073",
    appId: "1:578628752073:web:c916cc3f234865a2947318",
    measurementId: "G-0RVDLJX2LD"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();

  document.getElementById('signupBtn').onclick = e => {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const pass = document.getElementById('pass').value;
    const confirm = document.getElementById('confirm').value;

    if (pass !== confirm) return document.getElementById('message').innerHTML = '<div class="error">Passwords do not match</div>';
    if (pass.length < 6) return document.getElementById('message').innerHTML = '<div class="error">Password must be 6+ characters</div>';

    document.getElementById('signupBtn').disabled = true;
    document.getElementById('signupBtn').textContent = 'Creating...';

    auth.createUserWithEmailAndPassword(email, pass)
      .then(() => location.href = 'dashboard.html')
      .catch(err => {
        document.getElementById('message').innerHTML = `<div class="error">${err.message}</div>`;
        document.getElementById('signupBtn').disabled = false;
        document.getElementById('signupBtn').textContent = 'Sign Up';
      });
  };

  document.getElementById('googleSignup').onclick = () => {
    auth.signInWithPopup(new firebase.auth.GoogleAuthProvider())
      .then(() => location.href = 'dashboard.html');
  };
</script>
</body>
</html>
