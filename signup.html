<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up - TrueWebX</title>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

  <style>
    body {
      background: #f5f7fa;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    .form {
      display: flex;
      flex-direction: column;
      gap: 10px;
      background-color: #ffffff;
      padding: 30px;
      width: 450px;
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
    }

    ::placeholder { font-family: inherit; }

    .flex-column > label {
      color: #151717;
      font-weight: 600;
    }

    .inputForm {
      border: 1.5px solid #ecedec;
      border-radius: 10px;
      height: 50px;
      display: flex;
      align-items: center;
      padding-left: 10px;
      transition: 0.2s ease-in-out;
    }

    .input {
      margin-left: 10px;
      border: none;
      width: 100%;
      height: 100%;
      font-size: 15px;
      background: transparent;
    }

    .input:focus { outline: none; }

    .inputForm:focus-within {
      border: 1.5px solid #2d79f3;
    }

    .flex-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .span {
      font-size: 14px;
      color: #2d79f3;
      font-weight: 500;
      cursor: pointer;
    }

    .button-submit {
      margin: 20px 0 10px 0;
      background-color: #151717;
      border: none;
      color: white;
      font-size: 15px;
      font-weight: 500;
      border-radius: 10px;
      height: 50px;
      width: 100%;
      cursor: pointer;
      transition: 0.3s;
    }

    .button-submit:hover { background-color: #2d79f3; }
    .button-submit:disabled {
      background-color: #999;
      cursor: not-allowed;
    }

    .p {
      text-align: center;
      color: #333;
      font-size: 14px;
      margin: 5px 0;
    }

    .btn {
      width: 100%;
      height: 50px;
      border-radius: 10px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-weight: 500;
      gap: 10px;
      border: 1px solid #ededef;
      background-color: white;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn:hover { border-color: #2d79f3; }

    .error {
      color: #e74c3c;
      font-size: 13px;
      text-align: center;
      margin-top: 10px;
    }

    .success {
      color: #27ae60;
      font-size: 13px;
      text-align: center;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <form class="form" id="signupForm">
    <h2 style="text-align:center; margin-bottom:10px; color:#151717;">Create Account</h2>

    <div class="flex-column">
      <label>Email</label>
    </div>
    <div class="inputForm">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" viewBox="0 0 32 32" height="20">
        <g data-name="Layer 3"><path d="m30.853 13.87a15 15 0 0 0 -29.729 4.082 15.1 15.1 0 0 0 12.876 12.918 15.6 15.6 0 0 0 2.016.13 14.85 14.85 0 0 0 7.715-2.145 1 1 0 1 0 -1.031-1.711 13.007 13.007 0 1 1 5.458-6.529 2.149 2.149 0 0 1 -4.158-.759v-10.856a1 1 0 0 0 -2 0v1.726a8 8 0 1 0 .2 10.325 4.135 4.135 0 0 0 7.83.274 15.2 15.2 0 0 0 .823-7.455zm-14.853 8.13a6 6 0 1 1 6-6 6.006 6.006 0 0 1 -6 6z"></path></g>
      </svg>
      <input id="email" class="input" type="email" placeholder="Enter your Email" required />
    </div>

    <div class="flex-column">
      <label>Password</label>
    </div>
    <div class="inputForm">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" viewBox="-64 0 512 512" height="20">
        <path d="m336 512h-288c-26.453125 0-48-21.523438-48-48v-224c0-26.476562 21.546875-48 48-48h288c26.453125 0 48 21.523438 48 48v224c0 26.476562-21.546875 48-48 48zm-288-288c-8.8125 0-16 7.167969-16 16v224c0 8.832031 7.1875 16 16 16h288c8.8125 0 16-7.167969 16-16v-224c0-8.832031-7.1875-16-16-16zm0 0"></path>
        <path d="m304 224c-8.832031 0-16-7.167969-16-16v-80c0-52.929688-43.070312-96-96-96s-96 43.070312-96 96v80c0 8.832031-7.167969 16-16 16s-16-7.167969-16-16v-80c0-70.59375 57.40625-128 128-128s128 57.40625 128 128v80c0 8.832031-7.167969 16-16 16zm0 0"></path>
      </svg>
      <input id="password" class="input" type="password" placeholder="Create a Password" required />
    </div>

    <div class="flex-column">
      <label>Confirm Password</label>
    </div>
    <div class="inputForm">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" viewBox="-64 0 512 512" height="20">
        <path d="m336 512h-288c-26.453125 0-48-21.523438-48-48v-224c0-26.476562 21.546875-48 48-48h288c26.453125 0 48 21.523438 48 48v224c0 26.476562-21.546875 48-48 48zm-288-288c-8.8125 0-16 7.167969-16 16v224c0 8.832031 7.1875 16 16 16h288c8.8125 0 16-7.167969 16-16v-224c0-8.832031-7.1875-16-16-16zm0 0"></path>
        <path d="m304 224c-8.832031 0-16-7.167969-16-16v-80c0-52.929688-43.070312-96-96-96s-96 43.070312-96 96v80c0 8.832031-7.167969 16-16 16s-16-7.167969-16-16v-80c0-70.59375 57.40625-128 128-128s128 57.40625 128 128v80c0 8.832031-7.167969 16-16 16zm0 0"></path>
      </svg>
      <input id="confirmPassword" class="input" type="password" placeholder="Confirm your Password" required />
    </div>

    <div class="flex-row">
      <div>
        <input type="checkbox" id="remember" checked />
        <label for="remember">Remember me</label>
      </div>
    </div>

    <button type="submit" class="button-submit" id="signupBtn">Sign Up</button>

    <div id="message"></div>

    <p class="p">Already have an account? <span class="span" id="goToLogin">Sign In</span></p>
    <p class="p line">Or With</p>

    <div class="flex-row">
      <button type="button" class="btn google" id="googleSignup">
        <svg viewBox="0 0 512 512" width="20">
          <path d="M113.47,309.408L95.648,375.94l-65.139,1.378C11.042,341.211,0,299.9,0,256 c0-42.451,10.324-82.483,28.624-117.732h0.014l57.992,10.632l25.404,57.644c-5.317,15.501-8.215,32.141-8.215,49.456 C103.821,274.792,107.225,292.797,113.47,309.408z" fill="#FBBB00"></path>
          <path d="M507.527,208.176C510.467,223.662,512,239.655,512,256c0,18.328-1.927,36.206-5.598,53.451 c-12.462,58.683-45.025,109.925-90.134,146.187l-73.044-3.727l-10.338-64.535 c29.932-17.554,53.324-45.025,65.646-77.911h-136.89V208.176h138.887L507.527,208.176z" fill="#518EF8"></path>
          <path d="M416.253,455.624C372.396,490.901,316.666,512,256,512 c-97.491,0-182.252-54.491-225.491-134.681l82.961-67.91c21.619,57.698,77.278,98.771,142.53,98.771 c28.047,0,54.323-7.582,76.87-20.818L416.253,455.624z" fill="#28B446"></path>
          <path d="M419.404,58.936c-23.335-14.586-50.919-23.012-80.471-23.012 c-66.729,0-123.429,42.957-143.965,102.724l-83.397-68.276C71.23,56.123,157.06,0,256,0 C318.115,0,375.068,22.126,419.404,58.936z" fill="#F14336"></path>
        </svg>
        Sign up with Google
      </button>
    </div>
  </form>

  <script>
    // Your Firebase Config (same as login page)
    const firebaseConfig = {
      apiKey: "AIzaSyAHZ5v86FWK9uU-9LfZKaBsMR6QQ92JqQM",
      authDomain: "truewebx-78890.firebaseapp.com",
      projectId: "truewebx-78890",
      storageBucket: "truewebx-78890.firebasestorage.app",
      messagingSenderId: "578628752073",
      appId: "1:578628752073:web:c916cc3f234865a2947318",
      measurementId: "G-0RVDLJX2LD"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    const form = document.getElementById('signupForm');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const confirmPasswordInput = document.getElementById('confirmPassword');
    const rememberCheckbox = document.getElementById('remember');
    const signupBtn = document.getElementById('signupBtn');
    const googleBtn = document.getElementById('googleSignup');
    const messageDiv = document.getElementById('message');
    const goToLogin = document.getElementById('goToLogin');

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      messageDiv.innerHTML = '';

      const email = emailInput.value.trim();
      const password = passwordInput.value;
      const confirmPassword = confirmPasswordInput.value;

      if (password !== confirmPassword) {
        messageDiv.innerHTML = '<span class="error">Passwords do not match!</span>';
        return;
      }

      if (password.length < 6) {
        messageDiv.innerHTML = '<span class="error">Password must be at least 6 characters</span>';
        return;
      }

      signupBtn.disabled = true;
      signupBtn.textContent = 'Creating account...';

      const persistence = rememberCheckbox.checked 
        ? firebase.auth.Auth.Persistence.LOCAL 
        : firebase.auth.Auth.Persistence.SESSION;

      auth.setPersistence(persistence)
        .then(() => {
          return auth.createUserWithEmailAndPassword(email, password);
        })
        .then((userCredential) => {
          messageDiv.innerHTML = '<span class="success">Account created! Redirecting...</span>';
          setTimeout(() => {
            window.location.href = '/dashboard.html'; // Change to your dashboard
          }, 1500);
        })
        .catch((error) => {
          let msg = error.message;
          if (error.code === 'auth/email-already-in-use') {
            msg = 'This email is already registered.';
          } else if (error.code === 'auth/weak-password') {
            msg = 'Password should be at least 6 characters.';
          } else if (error.code === 'auth/invalid-email') {
            msg = 'Please enter a valid email.';
          }
          messageDiv.innerHTML = `<span class="error">${msg}</span>`;
          signupBtn.disabled = false;
          signupBtn.textContent = 'Sign Up';
        });
    });

    // Google Sign Up
    googleBtn.addEventListener('click', () => {
      const provider = new firebase.auth.GoogleAuthProvider();
      provider.addScope('email');
      provider.addScope('profile');

      const persistence = rememberCheckbox.checked 
        ? firebase.auth.Auth.Persistence.LOCAL 
        : firebase.auth.Auth.Persistence.SESSION;

      auth.setPersistence(persistence)
        .then(() => auth.signInWithPopup(provider))
        .then(() => {
          messageDiv.innerHTML = '<span class="success">Signed up with Google!</span>';
          setTimeout(() => {
            window.location.href = '/dashboard.html';
          }, 1500);
        })
        .catch((err) => {
          messageDiv.innerHTML = `<span class="error">${err.message}</span>`;
        });
    });

    // Go to Login
    goToLogin.addEventListener('click', () => {
      window.location.href = 'login.html'; // or your login page name
    });

    // Optional: redirect if already logged in
    auth.onAuthStateChanged((user) => {
      if (user) {
        window.location.href = '/dashboard.html';
      }
    });
  </script>
</body>
</html>
