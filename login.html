<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard TrueWebX – Panel de Control</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root { --coral: #ff6b6b; --turquoise: #0d9488; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: system-ui, sans-serif; background: linear-gradient(135deg, var(--turquoise), var(--coral)); color:white; min-height:100vh; padding-bottom:100px; }
    
    .bottom-nav {
        position:fixed; bottom:0; left:0; right:0; height:90px; background:rgba(0,0,0,0.92); backdrop-filter:blur(30px);
        display:flex; align-items:center; justify-content:center; z-index:9999; padding-bottom:env(safe-area-inset-bottom,20px);
    }
    .nav-container {
        background:rgba(255,255,255,0.08); backdrop-filter:blur(20px); border-radius:50px; padding:14px 36px;
        display:flex; gap:48px; box-shadow:0 8px 32px rgba(0,0,0,0.5);
    }
    .nav-item { display:flex; flex-direction:column; align-items:center; gap:6px; color:#888; font-size:11px; font-weight:600; transition:all 0.3s; cursor:pointer; }
    .nav-item i { font-size:26px; }
    .nav-item.active, .nav-item.active i { color:var(--coral); transform:scale(1.2); }

    .container { max-width:1200px; margin:0 auto; padding:20px; text-align:center; padding-top:60px; }
    .logo { font-size:3.5rem; font-weight:900; background:linear-gradient(45deg,#fff,#ff8fa3); -webkit-background-clip:text; color:transparent; }
    .glass { background:rgba(255,255,255,0.15); backdrop-filter:blur(20px); border-radius:32px; padding:40px; margin:40px 0; }
    .form-grid { display:grid; gap:16px; max-width:500px; margin:0 auto; }
    input, textarea, button { padding:16px; border-radius:16px; border:none; font-size:16px; }
    input, textarea { background:rgba(255,255,255,0.2); color:white; }
    button { background:var(--coral); color:white; font-weight:bold; cursor:pointer; }
    .services { display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:24px; margin-top:40px; }
    .card { background:rgba(255,255,255,0.15); border-radius:24px; padding:20px; position:relative; }
    .delete { position:absolute; top:10px; right:10px; background:red; color:white; width:36px; height:36px; border-radius:50%; display:grid; place-items:center; cursor:pointer; font-size:20px; }
    .private { filter:blur(6px); user-select:none; }
    .private:hover { filter:none; }
    .photos img { width:100%; max-width:300px; border-radius:12px; margin:8px 0; }

    /* Estilos del login (del HTML que me diste) */
    .login-container { display:flex; justify-content:center; align-items:center; min-height:100vh; }
    .form {display:flex;flex-direction:column;gap:10px;background-color:#ffffff;padding:30px;width:450px;border-radius:20px;box-shadow:0 10px 40px rgba(0,0,0,.08);color:#151717;}
    .flex-column > label {color:#151717;font-weight:600;}
    .inputForm {border:1.5px solid #ecedec;border-radius:10px;height:50px;display:flex;align-items:center;padding-left:10px;transition:.2s ease-in-out;}
    .input {margin-left:10px;border:none;width:100%;height:100%;background:transparent;font-size:15px;color:#151717;}
    .inputForm:focus-within {border:1.5px solid #2d79f3;}
    .flex-row {display:flex;flex-direction:row;align-items:center;gap:10px;justify-content:space-between;}
    .flex-row > div > label {font-size:14px;color:black;font-weight:400;}
    .span {font-size:14px;color:#2d79f3;font-weight:500;cursor:pointer;}
    .button-submit {margin:20px 0 10px;background-color:#151717;border:none;color:white;font-size:15px;font-weight:500;border-radius:10px;height:50px;width:100%;cursor:pointer;transition:.3s;}
    .button-submit:hover {background:#2d79f3;}
    .p {text-align:center;color:black;font-size:14px;margin:5px 0;}
    .btn {margin-top:10px;width:100%;height:50px;border-radius:10px;display:flex;justify-content:center;align-items:center;font-weight:500;gap:10px;border:1px solid #ededef;background:white;cursor:pointer;transition:.2s;}
    .btn:hover {border:1px solid #2d79f3;}
    .error {color:#e74c3c;text-align:center;font-size:13px;margin-top:10px;padding:10px;background:#fff5f5;border-radius:8px;}
  </style>
</head>
<body>

<!-- LOGIN CON TU DISEÑO EXACTO -->
<div id="loginScreen" class="login-container">
  <form class="form" id="loginForm">
    <div class="flex-column"><label>Email </label></div>
    <div class="inputForm">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" viewBox="0 0 32 32" height="20"><g data-name="Layer 3" id="Layer_3"><path d="m30.853 13.87a15 15 0 0 0 -29.729 4.082 15.1 15.1 0 0 0 12.876 12.918 15.6 15.6 0 0 0 2.016.13 14.85 14.85 0 0 0 7.715-2.145 1 1 0 1 0 -1.031-1.711 13.007 13.007 0 1 1 5.458-6.529 2.149 2.149 0 0 1 -4.158-.759v-10.856a1 1 0 0 0 -2 0v1.726a8 8 0 1 0 .2 10.325 4.135 4.135 0 0 0 7.83.274 15.2 15.2 0 0 0 .823-7.455zm-14.853 8.13a6 6 0 1 1 6-6 6.006 6.006 0 0 1 -6 6z"></path></g></svg>
      <input id="email" placeholder="Enter your Email" class="input" type="email" required>
    </div>

    <div class="flex-column"><label>Password </label></div>
    <div class="inputForm">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" viewBox="-64 0 512 512" height="20"><path d="m336 512h-288c-26.453125 0-48-21.523438-48-48v-224c0-26.476562 21.546875-48 48-48h288c26.453125 0 48 21.523438 48 48 48v224c0 26.476562-21.546875 48-48 48zm-288-288c-8.8125 0-16 7.167969-16 16v224c0 8.832031 7.1875 16 16 16h288c8.8125 0 16-7.167969 16-16v-224c0-8.832031-7.1875-16-16-16zm0 0"></path><path d="m304 224c-8.832031 0-16-7.167969-16-16v-80c0-52.929688-43.070312-96-96-96s-96 43.070312-96 96v80c0 8.832031-7.167969 16-16 16s-16-7.167969-16-16v-80c0-70.59375 57.40625-128 128-128s128 57.40625 128 128v80c0 8.832031-7.167969 16-16 16zm0 0"></path></svg>        
      <input id="password" placeholder="Enter your Password" class="input" type="password" required>
    </div>

    <div class="flex-row">
      <div>
        <input type="checkbox" id="remember" checked>
        <label>Remember me </label>
      </div>
      <span class="span" id="forgot">Forgot password?</span>
    </div>

    <button type="submit" class="button-submit" id="loginBtn">Sign In</button>
    <div id="message"></div>

    <div class="flex-row">
      <button type="button" class="btn google" id="googleBtn">
        <svg xml:space="preserve" style="enable-background:new 0 0 512 512;" viewBox="0 0 512 512" width="20" version="1.1">
          <path d="M113.47,309.408L95.648,375.94l-65.139,1.378C11.042,341.211,0,299.9,0,256 c0-42.451,10.324-82.483,28.624-117.732h0.014l57.992,10.632l25.404,57.644c-5.317,15.501-8.215,32.141-8.215,49.456 C103.821,274.792,107.225,292.797,113.47,309.408z" style="fill:#FBBB00;"></path>
          <path d="M507.527,208.176C510.467,223.662,512,239.655,512,256c0,18.328-1.927,36.206-5.598,53.451 c-12.462,58.683-45.025,109.925-90.134,146.187l-0.014-0.014l-73.044-3.727l-10.338-64.535 c29.932-17.554,53.324-45.025,65.646-77.911h-136.89V208.176h138.887L507.527,208.176L507.527,208.176z" style="fill:#518EF8;"></path>
          <path d="M416.253,455.624l0.014,0.014C372.396,490.901,316.666,512,256,512 c-97.491,0-182.252-54.491-225.491-134.681l82.961-67.91c21.619,57.698,77.278,98.771,142.53,98.771 c28.047,0,54.323-7.582,76.87-20.818L416.253,455.624z" style="fill:#28B446;"></path>
          <path d="M419.404,58.936l-82.933,67.896c-23.335-14.586-50.919-23.012-80.471-23.012 c-66.729,0-123.429,42.957-143.965,102.724l-83.397-68.276h-0.014C71.23,56.123,157.06,0,256,0 C318.115,0,375.068,22.126,419.404,58.936z" style="fill:#F14336;"></path>
        </svg>
        Google 
      </button>
    </div>
  </form>
</div>

<!-- DASHBOARD COMPLETO (oculto hasta login) -->
<div id="dashboardScreen" style="display:none;">
  <div class="bottom-nav">
      <div class="nav-container">
          <div class="nav-item active" onclick="show('home')"><i class="fas fa-home"></i><span>Home</span></div>
          <div class="nav-item" onclick="show('add')"><i class="fas fa-plus-circle"></i><span>Ofrecer</span></div>
          <div class="nav-item" onclick="logout()"><i class="fas fa-sign-out-alt"></i><span>Salir</span></div>
      </div>
  </div>

  <div class="container">
      <h1 class="logo">TrueWebX – Panel Admin</h1>
      <p>Bienvenido al panel de control – Aquí gestionas todo</p>

      <div id="home" class="glass">
          <h2>Servicios disponibles (Admin)</h2>
          <div class="services" id="list"></div>
      </div>

      <div id="add" class="glass" style="display:none;">
          <h2>Publica un nuevo servicio</h2>
          <div class="form-grid">
              <input type="text" id="name" placeholder="Nombre completo" required>
              <input type="text" id="city" placeholder="Ciudad y País" required>
              <input type="tel" id="phone" placeholder="Teléfono" required>
              <input type="email" id="email" placeholder="Email" required>
              <input type="text" id="price" placeholder="Precio" required>
              <textarea id="desc" placeholder="Descripción" required></textarea>
              <input type="file" id="profile" accept="image/*">
              <input type="file" id="photos" accept="image/*" multiple>
              <button onclick="addService()">PUBLICAR AHORA</button>
          </div>
          <p id="msg"></p>
      </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyAHZ5v86FWK9uU-9LfZKaBsMR6QQ92JqQM",
    authDomain: "truewebx-78890.firebaseapp.com",
    projectId: "truewebx-78890",
    storageBucket: "truewebx-78890.firebasestorage.app",
    messagingSenderId: "578628752073",
    appId: "1:578628752073:web:c916cc3f234865a2947318",
    measurementId: "G-0RVDLJX2LD"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();

  // Supabase para datos e imágenes
  const SUPABASE_URL = 'https://vrpyomevjlsacourdmki.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_CyhH7Cwymoqf2fxdNj6D1Q_NHl6TmTV';
  const { createClient } = supabase;
  const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const list = document.getElementById('list');
  const msg = document.getElementById('msg');

  // === LOGIN CON TU DISEÑO EXACTO (mantengo todo tu código) ===
  const message = document.getElementById('message');
  const loginBtn = document.getElementById('loginBtn');

  function showError(text) {
    message.innerHTML = `<div class="error">${text}</div>`;
  }

  document.getElementById('loginForm').onsubmit = e => {
    e.preventDefault();
    loginBtn.disabled = true;
    loginBtn.textContent = 'Signing in...';

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const remember = document.getElementById('remember').checked;

    auth.setPersistence(remember ? firebase.auth.Auth.Persistence.LOCAL : firebase.auth.Auth.Persistence.SESSION)
      .then(() => auth.signInWithEmailAndPassword(email, password))
      .then(() => {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('dashboardScreen').style.display = 'block';
        loadServices();
      })
      .catch(err => {
        if (err.code === 'auth/invalid-credential' || err.code === 'auth/wrong-password' || err.code === 'auth/user-not-found') {
          showError('Correo o contraseña incorrectos.');
        } else if (err.code === 'auth/too-many-requests') {
          showError('Demasiados intentos. Intenta más tarde.');
        } else {
          showError('Error al iniciar sesión. Intenta de nuevo.');
        }
        loginBtn.disabled = false;
        loginBtn.textContent = 'Sign In';
      });
  };

  document.getElementById('googleBtn').onclick = () => {
    const provider = new firebase.auth.GoogleAuthProvider();
    auth.signInWithPopup(provider)
      .then(() => {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('dashboardScreen').style.display = 'block';
        loadServices();
      })
      .catch(() => showError('Error con Google.'));
  };

  function logout() {
    auth.signOut().then(() => {
      document.getElementById('dashboardScreen').style.display = 'none';
      document.getElementById('loginScreen').style.display = 'flex';
    });
  }

  // Auto redirect si ya está logueado
  auth.onAuthStateChanged(user => {
    if (user) {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('dashboardScreen').style.display = 'block';
      loadServices();
    }
  });

  // === FUNCIONES DEL DASHBOARD (igual que antes, usando "desc") ===
  function show(section) {
      document.getElementById('home').style.display = section === 'home' ? 'block' : 'none';
      document.getElementById('add').style.display = section === 'add' ? 'block' : 'none';
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      document.querySelectorAll('.nav-item')[section === 'home' ? 0 : 1].classList.add('active');
      if (section === 'home') loadServices();
  }

  async function addService() {
      // Código de subida de imágenes y guardado igual que antes (con desc)
      const profileFile = document.getElementById('profile').files[0];
      const photoFiles = document.getElementById('photos').files;

      let profileUrl = 'https://via.placeholder.com/300?text=Sin+Perfil';

      if (profileFile) {
          const fileExt = profileFile.name.split('.').pop();
          const fileName = `profile_${crypto.randomUUID()}.${fileExt}`;
          const { error: uploadError } = await supabaseClient.storage.from('profiles').upload(fileName, profileFile);
          if (uploadError) { msg.innerHTML = `<p style="color:red;">Error subiendo perfil: ${uploadError.message}</p>`; return; }
          const { data } = supabaseClient.storage.from('profiles').getPublicUrl(fileName);
          profileUrl = data.publicUrl;
      }

      const photosUrls = [];
      for (let file of photoFiles) {
          const fileExt = file.name.split('.').pop();
          const fileName = `photo_${crypto.randomUUID()}.${fileExt}`;
          const { error: uploadError } = await supabaseClient.storage.from('photos').upload(fileName, file);
          if (uploadError) { msg.innerHTML = `<p style="color:red;">Error subiendo foto: ${uploadError.message}</p>`; return; }
          const { data } = supabaseClient.storage.from('photos').getPublicUrl(fileName);
          photosUrls.push(data.publicUrl);
      }

      const service = {
          id: crypto.randomUUID(),
          name: document.getElementById('name').value.trim(),
          city: document.getElementById('city').value.trim(),
          phone: document.getElementById('phone').value.trim(),
          email: document.getElementById('email').value.trim(),
          price: document.getElementById('price').value.trim(),
          desc: document.getElementById('desc').value.trim(),
          profile: profileUrl,
          photos: photosUrls,
          created_at: new Date().toISOString()
      };

      const { error } = await supabaseClient.from('services').insert(service);
      if (error) { msg.innerHTML = `<p style="color:red;">Error: ${error.message}</p>`; return; }

      msg.innerHTML = '<p style="color:#0f0; margin-top:20px;">¡Publicado con éxito!</p>';
      document.querySelector('.form-grid').reset();
      setTimeout(() => { show('home'); msg.innerHTML = ''; }, 2000);
  }

  async function deleteService(id) {
      if (confirm('¿Seguro que quieres borrar este servicio?')) {
          const { error } = await supabaseClient.from('services').delete().eq('id', id);
          if (error) { alert('Error: ' + error.message); return; }
          loadServices();
      }
  }

  async function loadServices() {
      const { data: services, error } = await supabaseClient.from('services').select('*').order('created_at', { ascending: false });
      if (error) { list.innerHTML = `<p>Error: ${error.message}</p>`; return; }

      list.innerHTML = services.length === 0
          ? '<p>No hay servicios aún.</p>'
          : services.map(s => `
              <div class="card">
                  <div class="delete" onclick="deleteService('${s.id}')">×</div>
                  <img src="${s.profile}" style="width:100%;max-width:300px;border-radius:16px;margin:10px 0;">
                  <h3>${s.name}</h3>
                  <p><strong>${s.city}</strong></p>
                  <p>${s.desc}</p>
                  <div class="photos">${s.photos.map(p => `<img src="${p}">`).join('')}</div>
                  <p>Tel: <span class="private">${s.phone}</span></p>
                  <p>Email: <span class="private">${s.email}</span></p>
                  <p style="font-size:1.8rem;color:var(--coral);"><strong>${s.price}</strong></p>
                  <small>${new Date(s.created_at).toLocaleString()}</small>
              </div>
          `).join('');
  }
</script>
</body>
</html>
