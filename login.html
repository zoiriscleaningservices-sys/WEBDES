<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TrueWebX - Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

  <style>
    :root { --bg: #000; --card: rgba(20,20,20,0.7); --gold: #FFD700; --text: #fff; --input: rgba(40,40,40,0.8); --border: rgba(255,215,0,0.3); }
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }
    body { background:var(--bg); color:var(--text); min-height:100vh; display:grid; place-items:center; overflow:hidden; }
    .bg { position:fixed; inset:0; background:linear-gradient(135deg,#000,#1a0000); z-index:-2; }
    .glow { position:fixed; top:-50%; left:-50%; width:200%; height:200%; background:radial-gradient(circle at center,rgba(255,215,0,0.15),transparent 70%); animation:pulse 8s infinite; z-index:-1; }
    @keyframes pulse { 0%,100% {transform:scale(1)} 50% {transform:scale(1.1)} }
    .card { background:var(--card); backdrop-filter:blur(20px); border:1px solid var(--border); border-radius:24px; padding:50px 60px; max-width:420px; width:100%; box-shadow:0 20px 60px rgba(0,0,0,0.6); text-align:center; }
    .logo { width:80px; height:80px; margin:0 auto 20px; background:var(--gold); border-radius:50%; display:grid; place-items:center; font-size:2.5rem; color:#000; }
    h1 { font-size:2.2rem; margin-bottom:8px; }
    p { color:#aaa; margin-bottom:40px; }
    input { width:100%; padding:16px 20px; margin:12px 0; background:var(--input); border:1px solid transparent; border-radius:12px; color:white; font-size:1rem; }
    input:focus { outline:none; border-color:var(--gold); box-shadow:0 0 0 3px rgba(255,215,0,0.2); }
    button { width:100%; padding:16px; margin:12px 0; border:none; border-radius:12px; font-size:1.1rem; font-weight:600; cursor:pointer; }
    .btn-gold { background:var(--gold); color:#000; }
    .btn-gold:hover { background:#ffed4e; transform:translateY(-2px); }
    .btn-google { background:rgba(255,255,255,0.1); color:white; border:1px solid rgba(255,255,255,0.2); }
    .divider { margin:30px 0; color:#666; position:relative; }
    .divider::before { content:''; position:absolute; top:50%; left:0; right:0; height:1px; background:rgba(255,255,255,0.1); }
    .divider span { background:var(--card); padding:0 15px; }
    #msg { margin-top:20px; padding:12px; border-radius:8px; display:none; }
    .success { background:rgba(40,167,69,0.3); border:1px solid #28a745; }
    .error { background:rgba(220,53,69,0.3); border:1px solid #dc3545; }
  </style>
</head>
<body>

<div class="bg"></div>
<div class="glow"></div>

<div class="card">
  <div class="logo">X</div>
  <h1>TrueWebX</h1>
  <p>Sign in to access your account</p>

  <form id="loginForm">
    <input type="email" id="email" placeholder="Email address" required />
    <input type="password" id="password" placeholder="Password" required />
    <button type="submit" class="btn-gold">Continue with Email</button>
  </form>

  <div class="divider"><span>or</span></div>

  <button onclick="googleLogin()" class="btn-google">
    <i class="fab fa-google me-2"></i> Continue with Google
  </button>

  <div id="msg"></div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAHZ5v86FWK9uU-9LfZKaBsMR6QQ92JqQM",
    authDomain: "truewebx-78890.firebaseapp.com",
    projectId: "truewebx-78890",
    storageBucket: "truewebx-78890.firebasestorage.app",
    messagingSenderId: "578628752073",
    appId: "1:578628752073:web:c916cc3f234865a2947318",
    measurementId: "G-0RVDLJX2LD"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const provider = new GoogleAuthProvider();

  // If user is already logged in → go straight to main site
  onAuthStateChanged(auth, (user) => {
    if (user) {
      window.location.href = '/main.html'; // your real landing page
    }
  });

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const msg = document.getElementById('msg');

    try {
      await signInWithEmailAndPassword(auth, email, password);
    } catch (error) {
      if (error.code === 'auth/user-not-found' || error.code === 'auth/invalid-credential') {
        await createUserWithEmailAndPassword(auth, email, password);
        msg.innerHTML = '<div class="success">Account created! Welcome!</div>';
      } else {
        msg.innerHTML = `<div class="error">${error.message}</div>`;
        msg.style.display = 'block';
        return;
      }
    }
    window.location.href = '/main.html';
  });

  window.googleLogin = async () => {
    await signInWithPopup(auth, provider);
    window.location.href = '/main.html';
  };
</script>
</body>
</html>
