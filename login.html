<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TrueWebX - Login</title>
  <meta name="description" content="TrueWebX - High-converting Webflow websites"/>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

  <style>
    :root {
      --bg: #000;
      --card: rgba(20, 20, 20, 0.7);
      --gold: #FFD700;
      --text: #fff;
      --input-bg: rgba(40, 40, 40, 0.8);
      --border: rgba(255, 215, 0, 0.3);
    }
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }
    body {
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
    }
    .background {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #000 0%, #1a0000 100%);
      z-index: -2;
    }
    .glow {
      position: fixed;
      top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: radial-gradient(circle at center, rgba(255,215,0,0.15) 0%, transparent 70%);
      animation: pulse 8s infinite;
      z-index: -1;
    }
    @keyframes pulse {
      0%,100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
    .login-card {
      background: var(--card);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 50px 60px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      text-align: center;
      position: relative;
      z-index: 10;
    }
    .logo {
      width: 80px;
      height: 80px;
      margin: 0 auto 20px;
      background: var(--gold);
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: 2.5rem;
      color: #000;
    }
    h1 {
      font-size: 2.2rem;
      margin-bottom: 8px;
      font-weight: 700;
    }
    p.subtitle {
      color: #aaa;
      margin-bottom: 40px;
    }
    input {
      width: 100%;
      padding: 16px 20px;
      margin: 12px 0;
      background: var(--input-bg);
      border: 1px solid transparent;
      border-radius: 12px;
      color: white;
      font-size: 1rem;
      transition: 0.3s;
    }
    input:focus {
      outline: none;
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(255,215,0,0.2);
    }
    button {
      width: 100%;
      padding: 16px;
      margin: 12px 0;
      border: none;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
    }
    .btn-primary {
      background: var(--gold);
      color: #000;
    }
    .btn-primary:hover {
      background: #ffed4e;
      transform: translateY(-2px);
    }
    .btn-google {
      background: rgba(255,255,255,0.1);
      color: white;
      border: 1px solid rgba(255,255,255,0.2);
    }
    .btn-google:hover {
      background: rgba(255,255,255,0.2);
    }
    .divider {
      margin: 30px 0;
      color: #666;
      position: relative;
    }
    .divider::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 0; right: 0;
      height: 1px;
      background: rgba(255,255,255,0.1);
    }
    .divider span {
      background: var(--card);
      padding: 0 15px;
    }
    #message {
      margin-top: 20px;
      padding: 12px;
      border-radius: 8px;
      display: none;
    }
    .success { background: rgba(40, 167, 69, 0.3); border: 1px solid #28a745; }
    .error   { background: rgba(220, 53, 69, 0.3); border: 1px solid #dc3545; }
  </style>
</head>
<body>

<div class="background"></div>
<div class="glow"></div>

<div class="login-card">
  <div class="logo">X</div>
  <h1>Welcome Back</h1>
  <p class="subtitle">Sign in to access TrueWebX</p>

  <form id="loginForm">
    <input type="email" id="email" placeholder="Email address" required />
    <input type="password" id="password" placeholder="Password" required />
    <button type="submit" class="btn-primary">Continue with Email</button>
  </form>

  <div class="divider"><span>or</span></div>

  <button onclick="googleLogin()" class="btn-google">
    <i class="fab fa-google me-2"></i> Continue with Google
  </button>

  <div id="message"></div>
</div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
  import { 
    getAuth, 
    signInWithEmailAndPassword, 
    createUserWithEmailAndPassword,
    GoogleAuthProvider, 
    signInWithPopup,
    onAuthStateChanged 
  } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAHZ5v86FWK9uU-9LfZKaBsMR6QQ92JqQM",
    authDomain: "truewebx-78890.firebaseapp.com",
    projectId: "truewebx-78890",
    storageBucket: "truewebx-78890.firebasestorage.app",
    messagingSenderId: "578628752073",
    appId: "1:578628752073:web:c916cc3f234865a2947318",
    measurementId: "G-0RVDLJX2LD"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const provider = new GoogleAuthProvider();

  // When user is logged in → redirect to your real website
  onAuthStateChanged(auth, (user) => {
    if (user && window.location.pathname !== '/index.html') {
      window.location.href = '/index.html'; // ← This is your beautiful main landing page
    }
  });

  // Email Login + Auto Sign-Up
  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const msg = document.getElementById('message');

    try {
      await signInWithEmailAndPassword(auth, email, password);
    } catch (error) {
      if (error.code === 'auth/user-not-found' || error.code === 'auth/invalid-credential') {
        // Auto create account
        await createUserWithEmailAndPassword(auth, email, password);
        msg.innerHTML = '<div class="success">Account created! Welcome!</div>';
      } else {
        msg.innerHTML = `<div class="error">${error.message}</div>`;
        msg.style.display = 'block';
        return;
      }
    }
    // Success → redirect
    window.location.href = '/index.html';
  });

  // Google Login
  window.googleLogin = async () => {
    try {
      await signInWithPopup(auth, provider);
      window.location.href = '/index.html';
    } catch (error) {
      document.getElementById('message').innerHTML = `<div class="error">${error.message}</div>`;
      document.getElementById('message').style.display = 'block';
    }
  };
</script>

</body>
</html>
