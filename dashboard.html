<body>
    <!-- Todo tu HTML original aquí (login, dashboard, forms, etc.) -->

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAHZ5v86FWK9uU-9LfZKaBsMR6QQ92JqQM",
            authDomain: "truewebx-78890.firebaseapp.com",
            projectId: "truewebx-78890",
            storageBucket: "truewebx-78890.firebasestorage.app",
            messagingSenderId: "578628752073",
            appId: "1:578628752073:web:c916cc3f234865a2947318"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        const SUPABASE_URL = 'https://vrpyomevjlsacourdmki.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_CyhH7Cwymoqf2fxdNj6D1Q_NHl6TmTV';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ... todas tus funciones (login, loadDashboard, show, addSocialLink, etc.) ...

        async function addService() {
            if (isPublishing) return;
            
            const name = document.getElementById('name').value.trim();
            const city = document.getElementById('city').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const gmail = document.getElementById('gmail').value.trim();
            const price = document.getElementById('price').value.trim();
            const desc = document.getElementById('desc').value.trim();
            const profileFile = document.getElementById('profile').files[0];

            if (!name || !city || !phone || !gmail || !desc || !profileFile) {
                msg.innerHTML = '<p style="color:red;">¡Todos los campos son obligatorios excepto el precio y las fotos adicionales!</p>';
                return;
            }

            isPublishing = true;
            const publishBtn = document.getElementById('publishBtn');
            publishBtn.disabled = true;
            publishBtn.textContent = 'PUBLICANDO...';

            const user = auth.currentUser;
            if (!user) return;

            const fileExt = profileFile.name.split('.').pop();
            const fileName = `profile_${crypto.randomUUID()}.${fileExt}`;
            const { error: profileError } = await supabaseClient.storage.from('profiles').upload(fileName, profileFile);
            if (profileError) {
                msg.innerHTML = `<p style="color:red;">Error al subir perfil: ${profileError.message}</p>`;
                isPublishing = false;
                publishBtn.disabled = false;
                publishBtn.textContent = 'PUBLICAR AHORA';
                return;
            }
            const { data: profileData } = supabaseClient.storage.from('profiles').getPublicUrl(fileName);
            const profileUrl = profileData.publicUrl;

            const photoFiles = document.getElementById('photos').files;
            const photosUrls = [];
            for (let file of photoFiles) {
                const fileExt = file.name.split('.').pop();
                const fileName = `photo_${crypto.randomUUID()}.${fileExt}`;
                const { error } = await supabaseClient.storage.from('photos').upload(fileName, file);
                if (error) continue;
                const { data } = supabaseClient.storage.from('photos').getPublicUrl(fileName);
                photosUrls.push(data.publicUrl);
            }

            const tempId = crypto.randomUUID();
            const slug = `${name.toLowerCase().replace(/[^a-z0-9]+/g, '-')}-${city.toLowerCase().replace(/[^a-z0-9]+/g, '-')}-${tempId.slice(-8)}`;

            const service = {
                id: tempId,
                owner_id: user.uid.toString(), // ← ESTA LÍNEA ES LA QUE ARREGLA TODO
                name, city, phone, gmail,
                price: price || null,
                description: desc,
                profile: profileUrl,
                photos: photosUrls,
                social_links: currentSocialLinks,
                slug: slug,
                created_at: new Date().toISOString()
            };

            const { error } = await supabaseClient.from('services').insert(service);
            if (error) {
                msg.innerHTML = `<p style="color:red;">Error: ${error.message}</p>`;
            } else {
                msg.innerHTML = `<p style="color:#0f0;">¡Publicado con éxito!</p>
                    <p>Página individual: <a href="service.html?slug=${slug}" target="_blank" style="color:#ffeb3b;">Abrir página SEO</a></p>`;
                document.querySelector('.form-grid').reset();
                currentSocialLinks = [];
                document.getElementById('added-socials').innerHTML = '';
                setTimeout(() => { show('home'); msg.innerHTML = ''; }, 5000);
            }

            isPublishing = false;
            publishBtn.disabled = false;
            publishBtn.textContent = 'PUBLICAR AHORA';
        }

        // ... el resto de tu script (edit, update, delete) queda igual
    </script>
</body>
