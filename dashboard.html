<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrueWebX – Mi Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --coral: #ff6b6b; --turquoise: #0d9488; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: system-ui, sans-serif; background: linear-gradient(135deg, var(--turquoise), var(--coral)); color:white; min-height:100vh; }

        .login-container { 
            display:flex; justify-content:center; align-items:center; min-height:100vh; padding:20px; 
        }
        .form { 
            width:100%; max-width:450px; background:#ffffff; color:#151717; padding:30px; border-radius:20px; 
            box-shadow:0 10px 40px rgba(0,0,0,.15); 
        }
        .inputForm { height:50px; border:1.5px solid #ecedec; border-radius:10px; padding-left:10px; display:flex; align-items:center; }
        .input { width:100%; height:100%; border:none; background:transparent; font-size:15px; }
        .inputForm:focus-within { border-color:#2d79f3; }
        .button-submit { background:#151717; color:white; height:50px; border-radius:10px; font-weight:500; }
        .button-submit:hover { background:#2d79f3; }
        .btn.google { background:white; border:1px solid #ededef; height:50px; border-radius:10px; display:flex; align-items:center; justify-content:center; gap:10px; }
        .error { color:#e74c3c; background:#fff5f5; padding:10px; border-radius:8px; text-align:center; margin-top:10px; }

        .bottom-nav {
            position:fixed; bottom:0; left:0; right:0; height:80px; background:rgba(0,0,0,0.9); backdrop-filter:blur(20px);
            display:flex; align-items:center; justify-content:center; z-index:9999; padding-bottom:env(safe-area-inset-bottom);
        }
        .nav-container {
            background:rgba(255,255,255,0.1); backdrop-filter:blur(20px); border-radius:50px; padding:12px 30px;
            display:flex; gap:40px; box-shadow:0 8px 32px rgba(0,0,0,0.5);
        }
        .nav-item { display:flex; flex-direction:column; align-items:center; gap:6px; color:#888; font-size:11px; font-weight:600; cursor:pointer; }
        .nav-item i { font-size:24px; }
        .nav-item.active, .nav-item.active i { color:var(--coral); transform:scale(1.15); }

        .container { max-width:1200px; margin:0 auto; padding:20px; padding-top:80px; padding-bottom:100px; }
        .logo { font-size: clamp(2.5rem, 8vw, 4rem); font-weight:900; background:linear-gradient(45deg,#fff,#ff8fa3); -webkit-background-clip:text; color:transparent; text-align:center; margin:20px 0; }
        .glass { background:rgba(255,255,255,0.15); backdrop-filter:blur(20px); border-radius:32px; padding:30px; margin:20px 0; }
        .form-grid { display:grid; gap:16px; max-width:600px; margin:0 auto; }
        input, textarea, button { padding:16px; border-radius:16px; border:none; font-size:16px; }
        input, textarea { background:rgba(255,255,255,0.2); color:white; }
        button { background:var(--coral); color:white; font-weight:bold; cursor:pointer; }
        button.disabled { background: gray; cursor: not-allowed; }
        .services { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:24px; margin-top:20px; }
        .card { background:rgba(255,255,255,0.15); border-radius:24px; padding:20px; position:relative; }
        .edit, .delete { position:absolute; top:10px; right:10px; background:#ffeb3b; color:black; width:36px; height:36px; border-radius:50%; display:grid; place-items:center; cursor:pointer; font-size:20px; opacity:0; transition:opacity 0.3s; }
        .delete { background:red; color:white; right:60px; }
        .card:hover .edit, .card:hover .delete { opacity:1; }
        .private { filter:blur(6px); user-select:none; }
        .private:hover { filter:none; }
        .photos img { width:100%; max-width:280px; border-radius:12px; margin:8px 0; }
        .links { margin-top:15px; }
        .links a { color:var(--coral); text-decoration:none; font-weight:600; display:inline-block; margin-right:10px; }

        .link-input { display:flex; gap:10px; margin-bottom:10px; }
        .link-input select, .link-input input { flex:1; }
        .link-input button { flex:0 0 40px; background:#0d9488; color:white; font-size:20px; padding:0; }

        @media (max-width: 768px) {
            .nav-container { gap:30px; padding:10px 20px; }
            .form-grid { padding:0 10px; }
            .services { grid-template-columns:1fr; }
            .edit, .delete { opacity:1; }
            .link-input { flex-direction:column; }
        }
    </style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen" class="login-container">
    <form class="form" id="loginForm">
        <div class="flex-column"><label>Email </label></div>
        <div class="inputForm">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" viewBox="0 0 32 32" height="20"><path d="m30.853 13.87a15 15 0 0 0 -29.729 4.082 15.1 15.1 0 0 0 12.876 12.918 15.6 15.6 0 0 0 2.016.13 14.85 14.85 0 0 0 7.715-2.145 1 1 0 1 0 -1.031-1.711 13.007 13.007 0 1 1 5.458-6.529 2.149 2.149 0 0 1 -4.158-.759v-10.856a1 1 0 0 0 -2 0v1.726a8 8 0 1 0 .2 10.325 4.135 4.135 0 0 0 7.83.274 15.2 15.2 0 0 0 .823-7.455zm-14.853 8.13a6 6 0 1 1 6-6 6.006 6.006 0 0 1 -6 6z"></path></svg>
            <input id="email" placeholder="Tu email" class="input" type="email" required>
        </div>

        <div class="flex-column"><label>Contraseña </label></div>
        <div class="inputForm">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" viewBox="-64 0 512 512" height="20"><path d="m336 512h-288c-26.453125 0-48-21.523438-48-48v-224c0-26.476562 21.546875-48 48-48h288c26.453125 0 48 21.523438 48 48 48v224c0 26.476562-21.546875 48-48 48zm-288-288c-8.8125 0-16 7.167969-16 16v224c0 8.832031 7.1875 16 16 16h288c8.8125 0 16-7.167969 16-16v-224c0-8.832031-7.1875-16-16-16zm0 0"></path><path d="m304 224c-8.832031 0-16-7.167969-16-16v-80c0-52.929688-43.070312-96-96-96s-96 43.070312-96 96v80c0 8.832031-7.167969 16-16 16s-16-7.167969-16-16v-80c0-70.59375 57.40625-128 128-128s128 57.40625 128 128v80c0 8.832031-7.167969 16-16 16zm0 0"></path></svg>        
            <input id="password" placeholder="Tu contraseña" class="input" type="password" required>
        </div>

        <div class="flex-row" style="display:flex; justify-content:space-between; align-items:center; margin:15px 0;">
            <div><input type="checkbox" id="remember" checked><label>Recordarme</label></div>
        </div>

        <button type="submit" class="button-submit" id="loginBtn">Entrar</button>
        <div id="message"></div>

        <div class="flex-row" style="margin-top:20px;">
            <button type="button" class="btn google" id="googleBtn">
                <svg xml:space="preserve" viewBox="0 0 512 512" width="20"><path d="M113.47,309.408L95.648,375.94l-65.139,1.378C11.042,341.211,0,299.9,0,256 c0-42.451,10.324-82.483,28.624-117.732h0.014l57.992,10.632l25.404,57.644c-5.317,15.501-8.215,32.141-8.215,49.456 C103.821,274.792,107.225,292.797,113.47,309.408z" style="fill:#FBBB00;"></path><path d="M507.527,208.176C510.467,223.662,512,239.655,512,256c0,18.328-1.927,36.206-5.598,53.451 c-12.462,58.683-45.025,109.925-90.134,146.187l-0.014-0.014l-73.044-3.727l-10.338-64.535 c29.932-17.554,53.324-45.025,65.646-77.911h-136.89V208.176h138.887L507.527,208.176z" style="fill:#518EF8;"></path><path d="M416.253,455.624l0.014,0.014C372.396,490.901,316.666,512,256,512 c-97.491,0-182.252-54.491-225.491-134.681l82.961-67.91c21.619,57.698,77.278,98.771,142.53,98.771 c28.047,0,54.323-7.582,76.87-20.818L416.253,455.624z" style="fill:#28B446;"></path><path d="M419.404,58.936l-82.933,67.896c-23.335-14.586-50.919-23.012-80.471-23.012 c-66.729,0-123.429,42.957-143.965,102.724l-83.397-68.276h-0.014C71.23,56.123,157.06,0,256,0 C318.115,0,375.068,22.126,419.404,58.936z" style="fill:#F14336;"></path></svg>
                Google
            </button>
        </div>
    </form>
</div>

<!-- DASHBOARD -->
<div id="dashboardScreen" style="display:none;">
    <div class="bottom-nav">
        <div class="nav-container">
            <div class="nav-item active" onclick="show('home')"><i class="fas fa-home"></i><span>Mis Servicios</span></div>
            <div class="nav-item" onclick="show('add')"><i class="fas fa-plus-circle"></i><span>Nuevo</span></div>
            <div class="nav-item" onclick="logout()"><i class="fas fa-sign-out-alt"></i><span>Salir</span></div>
        </div>
    </div>

    <div class="container">
        <h1 class="logo">TrueWebX</h1>
        <p style="text-align:center; margin-bottom:30px;" id="welcomeMsg"></p>

        <div id="home" class="glass">
            <h2>Mis Servicios Publicados</h2>
            <div class="services" id="list"></div>
        </div>

        <div id="add" class="glass" style="display:none;">
            <h2>Publicar Nuevo Servicio</h2>
            <div class="form-grid" id="add-form">
                <input type="text" id="name" placeholder="Nombre completo" required>
                <input type="text" id="city" placeholder="Ciudad y País" required>
                <input type="tel" id="phone" placeholder="Teléfono" required>
                <input type="email" id="email" placeholder="Email" required>
                <input type="text" id="price" placeholder="Precio" required>
                <textarea id="desc" placeholder="Descripción detallada" required></textarea>
                <input type="file" id="profile" accept="image/*">
                <input type="file" id="photos" accept="image/*" multiple>
                <div id="links-container">
                    <h3>Redes Sociales</h3>
                    <div class="link-input">
                        <select>
                            <option value="instagram">Instagram</option>
                            <option value="tiktok">TikTok</option>
                            <option value="facebook">Facebook</option>
                            <option value="twitter">X (Twitter)</option>
                            <option value="linkedin">LinkedIn</option>
                            <option value="youtube">YouTube</option>
                            <option value="other">Otro</option>
                        </select>
                        <input type="url" placeholder="URL (ej. https://instagram.com/tuusuario)">
                        <button type="button" onclick="addLink()"><i class="fas fa-plus"></i></button>
                    </div>
                    <div id="added-links"></div>
                </div>
                <button id="submitBtn" onclick="addService()">PUBLICAR AHORA</button>
            </div>
            <p id="msg"></p>
        </div>

        <div id="edit" class="glass" style="display:none;">
            <h2>Editar Servicio</h2>
            <div class="form-grid" id="edit-form">
                <input type="text" id="edit-name" placeholder="Nombre completo" required>
                <input type="text" id="edit-city" placeholder="Ciudad y País" required>
                <input type="tel" id="edit-phone" placeholder="Teléfono" required>
                <input type="email" id="edit-email" placeholder="Email" required>
                <input type="text" id="edit-price" placeholder="Precio" required>
                <textarea id="edit-desc" placeholder="Descripción detallada" required></textarea>
                <input type="file" id="edit-profile" accept="image/*">
                <input type="file" id="edit-photos" accept="image/*" multiple>
                <div id="edit-links-container">
                    <h3>Redes Sociales</h3>
                    <div class="link-input">
                        <select>
                            <option value="instagram">Instagram</option>
                            <option value="tiktok">TikTok</option>
                            <option value="facebook">Facebook</option>
                            <option value="twitter">X (Twitter)</option>
                            <option value="linkedin">LinkedIn</option>
                            <option value="youtube">YouTube</option>
                            <option value="other">Otro</option>
                        </select>
                        <input type="url" placeholder="URL (ej. https://instagram.com/tuusuario)">
                        <button type="button" onclick="addLink(true)"><i class="fas fa-plus"></i></button>
                    </div>
                    <div id="edit-added-links"></div>
                </div>
                <button id="updateBtn" onclick="updateService()">ACTUALIZAR</button>
            </div>
            <p id="edit-msg"></p>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAHZ5v86FWK9uU-9LfZKaBsMR6QQ92JqQM",
        authDomain: "truewebx-78890.firebaseapp.com",
        projectId: "truewebx-78890",
        storageBucket: "truewebx-78890.firebasestorage.app",
        messagingSenderId: "578628752073",
        appId: "1:578628752073:web:c916cc3f234865a2947318"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    const SUPABASE_URL = 'https://vrpyomevjlsacourdmki.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_CyhH7Cwymoqf2fxdNj6D1Q_NHl6TmTV';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const list = document.getElementById('list');
    const msg = document.getElementById('msg');
    const welcomeMsg = document.getElementById('welcomeMsg');
    let currentEditId = null;
    let currentLinks = [];
    let isSubmitting = false; // Anti-spam

    document.getElementById('loginForm').onsubmit = e => {
        e.preventDefault();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        auth.signInWithEmailAndPassword(email, password)
            .then(() => loadDashboard())
            .catch(err => document.getElementById('message').innerHTML = `<div class="error">${err.message}</div>`);
    };

    document.getElementById('googleBtn').onclick = () => {
        auth.signInWithPopup(new firebase.auth.GoogleAuthProvider())
            .then(() => loadDashboard());
    };

    function logout() {
        auth.signOut().then(() => location.reload());
    }

    auth.onAuthStateChanged(user => {
        if (user) loadDashboard(user);
    });

    async function loadDashboard(user = auth.currentUser) {
        if (!user) return;
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('dashboardScreen').style.display = 'block';
        welcomeMsg.textContent = `¡Hola ${user.displayName || user.email.split('@')[0]}! Aquí gestionas tus servicios.`;

        const { data: services } = await supabaseClient
            .from('services')
            .select('*')
            .eq('owner_id', user.uid)
            .order('created_at', { ascending: false });

        list.innerHTML = services && services.length > 0
            ? services.map(s => `
                <div class="card">
                    <div class="edit" onclick="editService('${s.id}')"><i class="fas fa-edit"></i></div>
                    <div class="delete" onclick="deleteService('${s.id}')"><i class="fas fa-trash"></i></div>
                    <img src="${s.profile || 'https://via.placeholder.com/300?text=Perfil'}" style="width:100%;max-width:300px;border-radius:16px;margin:10px 0;">
                    <h3>${s.name}</h3>
                    <p><strong>${s.city}</strong></p>
                    <p>${s.description}</p>
                    <div class="photos">${Array.isArray(s.photos) ? s.photos.map(p => `<img src="${p}">`).join('') : ''}</div>
                    <p>Tel: <span class="private">${s.phone}</span></p>
                    <p>Email: <span class="private">${s.email}</span></p>
                    <p style="font-size:1.8rem;color:var(--coral);"><strong>${s.price}</strong></p>
                    <div class="links">
                        ${Array.isArray(s.links) && s.links.length > 0 
                            ? s.links.map(link => `<a href="${link.url}" target="_blank"><i class="fab fa-${link.type.toLowerCase()}"></i> ${link.type}</a>`).join('') 
                            : ''}
                    </div>
                </div>
            `).join('')
            : '<p style="text-align:center;">Aún no tienes servicios publicados. ¡Crea uno nuevo!</p>';
    }

    function show(section) {
        document.getElementById('home').style.display = section === 'home' ? 'block' : 'none';
        document.getElementById('add').style.display = section === 'add' ? 'block' : 'none';
        document.getElementById('edit').style.display = section === 'edit' ? 'block' : 'none';
        document.querySelectorAll('.nav-item').forEach((n, i) => n.classList.toggle('active', i === (section === 'home' ? 0 : 1)));
        if (section === 'home') loadDashboard();
        if (section === 'add') {
            currentLinks = [];
            updateAddedLinks();
        }
    }

    function addLink(isEdit = false) {
        const container = isEdit ? document.getElementById('edit-links-container') : document.getElementById('links-container');
        const inputContainer = container.querySelector('.link-input');
        const type = inputContainer.querySelector
