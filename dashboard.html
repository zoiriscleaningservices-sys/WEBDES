<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrueWebX – Mi Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --coral: #ff6b6b; --turquoise: #0d9488; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { 
            font-family: system-ui, sans-serif; 
            background: linear-gradient(135deg, var(--turquoise), var(--coral)); 
            color:white; 
            min-height:100vh; 
            display:flex;
            flex-direction:column;
        }

        .login-container { 
            display:flex; justify-content:center; align-items:center; flex:1; padding:20px; 
        }
        .form { 
            width:100%; max-width:450px; background:#ffffff; color:#151717; padding:40px; border-radius:20px; 
            box-shadow:0 10px 40px rgba(0,0,0,.15); text-align:center;
        }
        .inputForm { 
            height:56px; 
            border:2px solid #e0e0e0; 
            border-radius:12px; 
            padding:0 16px; 
            display:flex; 
            align-items:center; 
            margin-bottom:16px;
            background:white;
        }
        .inputForm:focus-within { 
            border-color:#2d79f3; 
            box-shadow:0 0 0 3px rgba(45,121,243,0.15);
        }
        .input { 
            width:100%; 
            height:100%; 
            border:none; 
            background:transparent; 
            font-size:16px; 
            color:#151717;
            outline:none;
        }
        .input::placeholder { color:#aaa; }
        .button-submit { 
            background:#151717; 
            color:white; 
            height:56px; 
            border-radius:12px; 
            font-weight:600; 
            font-size:16px;
            cursor:pointer; 
            width:100%; 
            margin:20px 0;
            border:none;
        }
        .button-submit:hover { background:#2d79f3; }
        .btn.google { 
            background:white; 
            border:2px solid #e0e0e0; 
            height:56px; 
            border-radius:12px; 
            display:flex; 
            align-items:center; 
            justify-content:center; 
            gap:12px; 
            cursor:pointer; 
            width:100%; 
            font-weight:600;
            color:#151717;
        }
        .btn.google:hover { border-color:#2d79f3; }
        .error { color:#e74c3c; background:#fff5f5; padding:12px; border-radius:8px; text-align:center; margin:10px 0; }
        .toggle-link { color:#2d79f3; cursor:pointer; font-weight:600; }

        .bottom-nav {
            position:fixed; bottom:0; left:0; right:0; height:80px; background:rgba(0,0,0,0.9); backdrop-filter:blur(20px);
            display:flex; align-items:center; justify-content:center; z-index:9999; padding-bottom:env(safe-area-inset-bottom);
        }
        .nav-container {
            background:rgba(255,255,255,0.1); backdrop-filter:blur(20px); border-radius:50px; padding:12px 30px;
            display:flex; gap:40px; box-shadow:0 8px 32px rgba(0,0,0,0.5);
        }
        .nav-item { display:flex; flex-direction:column; align-items:center; gap:6px; color:#888; font-size:11px; font-weight:600; cursor:pointer; }
        .nav-item i { font-size:24px; }
        .nav-item.active, .nav-item.active i { color:var(--coral); transform:scale(1.15); }

        .main-content {
            flex:1;
            padding:20px;
            padding-top:80px;
            padding-bottom:100px;
            display:flex;
            flex-direction:column;
            align-items:center;
        }
        .logo { 
            font-size: clamp(2.5rem, 8vw, 4rem); 
            font-weight:900; 
            background:linear-gradient(45deg,#fff,#ff8fa3); 
            -webkit-background-clip:text; 
            color:transparent; 
            text-align:center; 
            margin:20px 0; 
            cursor:pointer;
        }
        .glass { 
            background:rgba(255,255,255,0.15); 
            backdrop-filter:blur(20px); 
            border-radius:32px; 
            padding:30px; 
            margin:20px 0; 
            width:100%;
            max-width:600px;
        }
        .form-grid { display:grid; gap:16px; width:100%; }
        input, textarea, button { padding:16px; border-radius:16px; border:none; font-size:16px; }
        input, textarea { background:rgba(255,255,255,0.25); color:white; backdrop-filter:blur(10px); width:100%; }
        input::placeholder, textarea::placeholder { color:rgba(255,255,255,0.7); }
        button { background:var(--coral); color:white; font-weight:bold; cursor:pointer; width:100%; }
        button:disabled { background:#888; cursor:not-allowed; }
        .services { display:grid; grid-template-columns:1fr; gap:24px; margin-top:20px; width:100%; }
        .card { background:rgba(255,255,255,0.15); border-radius:24px; padding:20px; position:relative; width:100%; }
        .edit, .delete { position:absolute; top:10px; right:10px; background:#ffeb3b; color:black; width:36px; height:36px; border-radius:50%; display:grid; place-items:center; cursor:pointer; font-size:20px; opacity:0; transition:opacity 0.3s; }
        .delete { background:red; color:white; right:60px; }
        .card:hover .edit, .card:hover .delete { opacity:1; }
        .private { filter:blur(6px); user-select:none; transition: filter 0.3s; font-weight: 500; }
        .private:hover, .private:focus { filter:none; }
        .photos img { width:100%; max-width:280px; border-radius:12px; margin:8px 0; }
        .links { margin-top:15px; display:flex; flex-wrap:wrap; gap:10px; }
        .links a { color:var(--coral); text-decoration:none; font-weight:600; padding:8px 14px; background:rgba(255,255,255,0.1); border-radius:20px; display:flex; align-items:center; gap:6px; }

        .social-input { display:flex; gap:10px; margin-bottom:10px; align-items:center; }
        .social-input select, .social-input input { flex:1; padding:16px; border-radius:16px; border:none; font-size:16px; background:rgba(255,255,255,0.25); color:white; }
        .social-input button { flex:0 0 50px; height:50px; background:#0d9488; color:white; font-size:24px; border:none; border-radius:16px; cursor:pointer; display:grid; place-items:center; }

        .added-link { 
            display:flex; align-items:center; gap:10px; margin-bottom:8px; background:rgba(255,255,255,0.1); padding:10px; border-radius:16px; 
        }
        .added-link i { font-size:20px; }
        .added-link button { background:red; color:white; border:none; border-radius:50%; width:30px; height:30px; cursor:pointer; }

        @media (max-width: 768px) {
            .nav-container { gap:30px; padding:10px 20px; }
            .form-grid { padding:0 10px; }
            .services { grid-template-columns:1fr; }
            .edit, .delete { opacity:1; }
            .social-input { flex-direction:column; }
            .social-input button { height:50px; width:100%; }
            input, textarea { font-size:16px !important; }
            .main-content { padding:15px; padding-top:70px; padding-bottom:90px; }
            .glass { padding:20px; }
        }
    </style>
</head>
<body>

<!-- LOGIN / SIGN UP -->
<div id="loginScreen" class="login-container">
    <div class="form">
        <h2 style="margin-bottom:30px; color:#151717;" id="formTitle">Iniciar Sesión</h2>

        <form id="authForm">
            <div class="inputForm">
                <input id="email" placeholder="Tu email" class="input" type="email" required>
            </div>

            <div class="inputForm">
                <input id="password" placeholder="Tu contraseña" class="input" type="password" required>
            </div>

            <button type="submit" class="button-submit" id="authButton">Entrar</button>
        </form>

        <div id="message"></div>

        <p style="margin-top:20px; color:#666;">
            <span id="toggleText">¿No tienes cuenta?</span> 
            <span class="toggle-link" onclick="toggleAuthMode()">Regístrate aquí</span>
        </p>

        <div style="margin-top:20px;">
            <button type="button" class="btn google" id="googleBtn">
                <svg width="20" height="20" viewBox="0 0 512 512" fill="currentColor">
                    <path d="M113.47,309.408L95.648,375.94l-65.139,1.378C11.042,341.211,0,299.9,0,256 c0-42.451,10.324-82.483,28.624-117.732h0.014l57.992,10.632l25.404,57.644c-5.317,15.501-8.215,32.141-8.215,49.456 C103.821,274.792,107.225,292.797,113.47,309.408z" style="fill:#FBBB00;"></path>
                    <path d="M507.527,208.176C510.467,223.662,512,239.655,512,256c0,18.328-1.927,36.206-5.598,53.451 c-12.462,58.683-45.025,109.925-90.134,146.187l-0.014-0.014l-73.044-3.727l-10.338-64.535 c29.932-17.554,53.324-45.025,65.646-77.911h-136.89V208.176h138.887L507.527,208.176z" style="fill:#518EF8;"></path>
                    <path d="M416.253,455.624l0.014,0.014C372.396,490.901,316.666,512,256,512 c-97.491,0-182.252-54.491-225.491-134.681l82.961-67.91c21.619,57.698,77.278,98.771,142.53,98.771 c28.047,0,54.323-7.582,76.87-20.818L416.253,455.624z" style="fill:#28B446;"></path>
                    <path d="M419.404,58.936l-82.933,67.896c-23.335-14.586-50.919-23.012-80.471-23.012 c-66.729,0-123.429,42.957-143.965,102.724l-83.397-68.276h-0.014C71.23,56.123,157.06,0,256,0 C318.115,0,375.068,22.126,419.404,58.936z" style="fill:#F14336;"></path>
                </svg>
                Continuar con Google
            </button>
        </div>
    </div>
</div>

<!-- DASHBOARD -->
<div id="dashboardScreen" style="display:none;">
    <div class="bottom-nav">
        <div class="nav-container">
            <div class="nav-item active" onclick="show('home')"><i class="fas fa-home"></i><span>Mis Servicios</span></div>
            <div class="nav-item" onclick="show('add')"><i class="fas fa-plus-circle"></i><span>Nuevo</span></div>
            <div class="nav-item" onclick="window.location.href='https://truewebx.site/'"><i class="fas fa-globe"></i><span>Pública</span></div>
            <div class="nav-item" onclick="logoutAndGoHome()"><i class="fas fa-sign-out-alt"></i><span>Salir</span></div>
        </div>
    </div>

    <div class="main-content">
        <h1 class="logo" onclick="window.location.href='https://truewebx.site/'">TrueWebX</h1>
        <p style="text-align:center; margin-bottom:30px;" id="welcomeMsg"></p>

        <div id="home" class="glass">
            <h2>Mis Servicios Publicados</h2>
            <div class="services" id="list"></div>
        </div>

        <div id="add" class="glass" style="display:none;">
            <h2>Publicar Nuevo Servicio</h2>
            <div class="form-grid">
                <input type="text" id="name" placeholder="Nombre completo" required>
                <input type="text" id="city" placeholder="Ciudad y País" required>
                <input type="tel" id="phone" placeholder="Teléfono" required>
                <input type="email" id="gmail" placeholder="Gmail" required>
                <input type="text" id="price" placeholder="Precio" required>
                <textarea id="desc" placeholder="Descripción detallada" required></textarea>
                <input type="file" id="profile" accept="image/*" required>
                <input type="file" id="photos" accept="image/*" multiple>

                <div id="social-container">
                    <h3 style="color:white; margin:20px 0 10px;">Redes Sociales (opcional)</h3>
                    <div class="social-input">
                        <select id="social-type">
                            <option value="instagram">Instagram</option>
                            <option value="tiktok">TikTok</option>
                            <option value="facebook">Facebook</option>
                            <option value="twitter">X (Twitter)</option>
                            <option value="linkedin">LinkedIn</option>
                            <option value="youtube">YouTube</option>
                            <option value="whatsapp">WhatsApp</option>
                            <option value="other">Otro</option>
                        </select>
                        <input type="url" id="social-url" placeholder="URL completa (ej: https://instagram.com/tuusuario)">
                        <button type="button" onclick="addSocialLink()">+</button>
                    </div>
                    <div id="added-socials" style="margin-top:10px;"></div>
                </div>

                <button id="publishBtn" onclick="addService()">PUBLICAR AHORA</button>
            </div>
            <p id="msg"></p>
        </div>

        <div id="edit" class="glass" style="display:none;">
            <h2>Editar Servicio</h2>
            <div class="form-grid">
                <input type="text" id="edit-name" placeholder="Nombre completo" required>
                <input type="text" id="edit-city" placeholder="Ciudad y País" required>
                <input type="tel" id="edit-phone" placeholder="Teléfono" required>
                <input type="email" id="edit-gmail" placeholder="Gmail" required>
                <input type="text" id="edit-price" placeholder="Precio" required>
                <textarea id="edit-desc" placeholder="Descripción detallada" required></textarea>
                <input type="file" id="edit-profile" accept="image/*">
                <input type="file" id="edit-photos" accept="image/*" multiple>

                <div id="edit-social-container">
                    <h3 style="color:white; margin:20px 0 10px;">Redes Sociales</h3>
                    <div class="social-input">
                        <select id="edit-social-type">
                            <option value="instagram">Instagram</option>
                            <option value="tiktok">TikTok</option>
                            <option value="facebook">Facebook</option>
                            <option value="twitter">X (Twitter)</option>
                            <option value="linkedin">LinkedIn</option>
                            <option value="youtube">YouTube</option>
                            <option value="whatsapp">WhatsApp</option>
                            <option value="other">Otro</option>
                        </select>
                        <input type="url" id="edit-social-url" placeholder="URL completa">
                        <button type="button" onclick="addSocialLink(true)">+</button>
                    </div>
                    <div id="edit-added-socials" style="margin-top:10px;"></div>
                </div>

                <button onclick="updateService()">GUARDAR CAMBIOS</button>
            </div>
            <p id="edit-msg"></p>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAHZ5v86FWK9uU-9LfZKaBsMR6QQ92JqQM",
        authDomain: "truewebx-78890.firebaseapp.com",
        projectId: "truewebx-78890",
        storageBucket: "truewebx-78890.firebasestorage.app",
        messagingSenderId: "578628752073",
        appId: "1:578628752073:web:c916cc3f234865a2947318"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    const SUPABASE_URL = 'https://vrpyomevjlsacourdmki.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_CyhH7Cwymoqf2fxdNj6D1Q_NHl6TmTV';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const list = document.getElementById('list');
    const msg = document.getElementById('msg');
    const welcomeMsg = document.getElementById('welcomeMsg');
    let currentEditId = null;
    let currentSocialLinks = [];
    let isSignupMode = false;
    let isPublishing = false;

    function toggleAuthMode() {
        isSignupMode = !isSignupMode;
        document.getElementById('formTitle').textContent = isSignupMode ? 'Crear Cuenta' : 'Iniciar Sesión';
        document.getElementById('authButton').textContent = isSignupMode ? 'Registrarme' : 'Entrar';
        document.getElementById('toggleText').textContent = isSignupMode ? '¿Ya tienes cuenta?' : '¿No tienes cuenta?';
    }

    document.getElementById('authForm').onsubmit = e => {
        e.preventDefault();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        if (isSignupMode) {
            auth.createUserWithEmailAndPassword(email, password)
                .then(() => loadDashboard())
                .catch(err => document.getElementById('message').innerHTML = `<div class="error">${err.message}</div>`);
        } else {
            auth.signInWithEmailAndPassword(email, password)
                .then(() => loadDashboard())
                .catch(err => document.getElementById('message').innerHTML = `<div class="error">${err.message}</div>`);
        }
    };

    document.getElementById('googleBtn').onclick = () => {
        auth.signInWithPopup(new firebase.auth.GoogleAuthProvider())
            .then(() => loadDashboard());
    };

    function logoutAndGoHome() {
        auth.signOut().then(() => {
            window.location.href = 'https://truewebx.site/';
        });
    }

    auth.onAuthStateChanged(user => {
        if (user) loadDashboard(user);
    });

    async function loadDashboard(user = auth.currentUser) {
        if (!user) return;
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('dashboardScreen').style.display = 'block';
        welcomeMsg.textContent = `¡Hola ${user.displayName || user.email.split('@')[0]}!`;

        const { data: services } = await supabaseClient
            .from('services')
            .select('*')
            .eq('owner_id', user.uid)
            .order('created_at', { ascending: false });

        list.innerHTML = services && services.length > 0
            ? services.map(s => `
                <div class="card">
                    <div class="edit" onclick="editService('${s.id}')"><i class="fas fa-edit"></i></div>
                    <div class="delete" onclick="deleteService('${s.id}')">×</div>
                    <img src="${s.profile || 'https://via.placeholder.com/300?text=Perfil'}" style="width:100%;max-width:300px;border-radius:16px;margin:10px 0;">
                    <h3>${s.name || 'Sin nombre'}</h3>
                    <p><strong>${s.city || 'Sin ubicación'}</strong></p>
                    <p>${s.description || 'Sin descripción'}</p>
                    <div class="photos">${Array.isArray(s.photos) ? s.photos.map(p => `<img src="${p}">`).join('') : ''}</div>
                    <p>Tel: <span class="private">${s.phone || 'No disponible'}</span></p>
                    <p>Gmail: <span class="private">${s.gmail || 'No disponible'}</span></p>
                    <p style="font-size:1.8rem;color:var(--coral);"><strong>${s.price || 'Consultar'}</strong></p>
                    ${Array.isArray(s.social_links) && s.social_links.length > 0 ? `
                    <div class="links">
                        ${s.social_links.map(link => `
                            <a href="${link.url}" target="_blank">
                                <i class="fab fa-${link.type.toLowerCase()}"></i> ${link.type}
                            </a>
                        `).join('')}
                    </div>
                    ` : ''}
                </div>
            `).join('')
            : '<p style="text-align:center;">Aún no tienes servicios publicados. ¡Crea uno nuevo!</p>';
    }

    function show(section) {
        document.getElementById('home').style.display = section === 'home' ? 'block' : 'none';
        document.getElementById('add').style.display = section === 'add' ? 'block' : 'none';
        document.getElementById('edit').style.display = section === 'edit' ? 'block' : 'none';
        document.querySelectorAll('.nav-item').forEach((n, i) => n.classList.toggle('active', i === (section === 'home' ? 0 : 1)));
        if (section === 'home') loadDashboard();
        if (section === 'add') {
            currentSocialLinks = [];
            document.getElementById('added-socials').innerHTML = '';
            document.getElementById('publishBtn').disabled = false;
        }
    }

    function addSocialLink(isEdit = false) {
        const select = isEdit ? document.getElementById('edit-social-type') : document.getElementById('social-type');
        const input = isEdit ? document.getElementById('edit-social-url') : document.getElementById('social-url');
        const type = select.value;
        const url = input.value.trim();
        if (url && url.startsWith('http')) {
            currentSocialLinks.push({ type, url });
            updateAddedSocials(isEdit);
            input.value = '';
        } else if (url) {
            alert('Por favor ingresa una URL válida (con https://)');
        }
    }

    function updateAddedSocials(isEdit = false) {
        const container = isEdit ? 'edit-added-socials' : 'added-socials';
        document.getElementById(container).innerHTML = currentSocialLinks.map((link, i) => `
            <div class="added-link">
                <i class="fab fa-${link.type.toLowerCase()}"></i>
                <span>${link.type}: ${link.url}</span>
                <button onclick="removeSocialLink(${i}, ${isEdit})">×</button>
            </div>
        `).join('');
    }

    function removeSocialLink(index, isEdit = false) {
        currentSocialLinks.splice(index, 1);
        updateAddedSocials(isEdit);
    }

    async function addService() {
        if (isPublishing) return;
        
        const name = document.getElementById('name').value.trim();
        const city = document.getElementById('city').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const gmail = document.getElementById('gmail').value.trim();
        const price = document.getElementById('price').value.trim();
        const desc = document.getElementById('desc').value.trim();
        const profileFile = document.getElementById('profile').files[0];

        if (!name || !city || !phone || !gmail || !price || !desc || !profileFile) {
            msg.innerHTML = '<p style="color:red;">¡Todos los campos son obligatorios, incluyendo la foto de perfil!</p>';
            return;
        }

        isPublishing = true;
        const publishBtn = document.getElementById('publishBtn');
        publishBtn.disabled = true;
        publishBtn.textContent = 'PUBLICANDO...';

        const user = auth.currentUser;
        if (!user) return;

        // Subir foto de perfil
        const fileExt = profileFile.name.split('.').pop();
        const fileName = `profile_${crypto.randomUUID()}.${fileExt}`;
        const { error: profileError } = await supabaseClient.storage.from('profiles').upload(fileName, profileFile);
        if (profileError) {
            msg.innerHTML = `<p style="color:red;">Error al subir perfil: ${profileError.message}</p>`;
            isPublishing = false;
            publishBtn.disabled = false;
            publishBtn.textContent = 'PUBLICAR AHORA';
            return;
        }
        const { data: profileData } = supabaseClient.storage.from('profiles').getPublicUrl(fileName);
        const profileUrl = profileData.publicUrl;

        // Subir fotos adicionales
        const photoFiles = document.getElementById('photos').files;
        const photosUrls = [];
        for (let file of photoFiles) {
            const fileExt = file.name.split('.').pop();
            const fileName = `photo_${crypto.randomUUID()}.${fileExt}`;
            const { error } = await supabaseClient.storage.from('photos').upload(fileName, file);
            if (error) continue; // Ignora errores en fotos opcionales
            const { data } = supabaseClient.storage.from('photos').getPublicUrl(fileName);
            photosUrls.push(data.publicUrl);
        }

        const service = {
            id: crypto.randomUUID(),
            owner_id: user.uid,
            name, city, phone, gmail, price, description: desc,
            profile: profileUrl,
            photos: photosUrls,
            social_links: currentSocialLinks,
            created_at: new Date().toISOString()
        };

        const { error } = await supabaseClient.from('services').insert(service);
        if (error) {
            msg.innerHTML = `<p style="color:red;">Error: ${error.message}</p>`;
        } else {
            msg.innerHTML = '<p style="color:#0f0;">¡Publicado con éxito!</p>';
            document.querySelector('.form-grid').reset();
            currentSocialLinks = [];
            document.getElementById('added-socials').innerHTML = '';
            setTimeout(() => { show('home'); msg.innerHTML = ''; }, 2000);
        }

        // Rehabilitar botón después de 5 segundos (anti-spam)
        setTimeout(() => {
            isPublishing = false;
            publishBtn.disabled = false;
            publishBtn.textContent = 'PUBLICAR AHORA';
        }, 5000);
    }

    // Resto de funciones (editService, updateService, deleteService) permanecen igual
    async function editService(id) {
        currentEditId = id;
        const { data: service } = await supabaseClient.from('services').select('*').eq('id', id).single();

        document.getElementById('edit-name').value = service.name || '';
        document.getElementById('edit-city').value = service.city || '';
        document.getElementById('edit-phone').value = service.phone || '';
        document.getElementById('edit-gmail').value = service.gmail || '';
        document.getElementById('edit-price').value = service.price || '';
        document.getElementById('edit-desc').value = service.description || '';

        currentSocialLinks = Array.isArray(service.social_links) ? service.social_links : [];
        updateAddedSocials(true);

        show('edit');
    }

    async function updateService() {
        if (!currentEditId) return;

        const name = document.getElementById('edit-name').value.trim();
        const city = document.getElementById('edit-city').value.trim();
        const phone = document.getElementById('edit-phone').value.trim();
        const gmail = document.getElementById('edit-gmail').value.trim();
        const price = document.getElementById('edit-price').value.trim();
        const desc = document.getElementById('edit-desc').value.trim();

        if (!name || !city || !phone || !gmail || !price || !desc) {
            document.getElementById('edit-msg').innerHTML = '<p style="color:red;">Todos los campos son obligatorios</p>';
            return;
        }

        const profileFile = document.getElementById('edit-profile').files[0];
        const photoFiles = document.getElementById('edit-photos').files;

        const { data: current } = await supabaseClient.from('services').select('profile, photos').eq('id', currentEditId).single();

        let profileUrl = current.profile;
        if (profileFile) {
            const fileExt = profileFile.name.split('.').pop();
            const fileName = `profile_${crypto.randomUUID()}.${fileExt}`;
            const { error } = await supabaseClient.storage.from('profiles').upload(fileName, profileFile);
            if (error) throw error;
            const { data } = supabaseClient.storage.from('profiles').getPublicUrl(fileName);
            profileUrl = data.publicUrl;
        }

        let photosUrls = current.photos || [];
        for (let file of photoFiles) {
            const fileExt = file.name.split('.').pop();
            const fileName = `photo_${crypto.randomUUID()}.${fileExt}`;
            const { error } = await supabaseClient.storage.from('photos').upload(fileName, file);
            if (error) throw error;
            const { data } = supabaseClient.storage.from('photos').getPublicUrl(fileName);
            photosUrls.push(data.publicUrl);
        }

        const updates = {
            name, city, phone, gmail, price, description: desc,
            profile: profileUrl,
            photos: photosUrls,
            social_links: currentSocialLinks
        };

        const { error } = await supabaseClient.from('services').update(updates).eq('id', currentEditId);
        if (error) {
            document.getElementById('edit-msg').innerHTML = `<p style="color:red;">Error: ${error.message}</p>`;
            return;
        }

        document.getElementById('edit-msg').innerHTML = '<p style="color:#0f0;">¡Actualizado con éxito!</p>';
        currentEditId = null;
        currentSocialLinks = [];
        setTimeout(() => { show('home'); document.getElementById('edit-msg').innerHTML = ''; }, 2000);
    }

    async function deleteService(id) {
        if (confirm('¿Seguro que quieres borrar este servicio?')) {
            const { error } = await supabaseClient.from('services').delete().eq('id', id);
            if (error) alert('Error: ' + error.message);
            loadDashboard();
        }
    }
</script>
