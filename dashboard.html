<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrueWebX – Mi Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://js.stripe.com/v3/"></script> <!-- Stripe JS -->
    <style>
        :root { --coral: #ff6b6b; --turquoise: #0d9488; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { 
            font-family: system-ui, sans-serif; 
            background: linear-gradient(135deg, var(--turquoise), var(--coral)); 
            color:white; 
            min-height:100vh; 
            display:flex;
            flex-direction:column;
        }

        .login-container { 
            display:flex; justify-content:center; align-items:center; flex:1; padding:20px; 
        }
        .form { 
            width:100%; max-width:450px; background:#ffffff; color:#151717; padding:40px; border-radius:20px; 
            box-shadow:0 10px 40px rgba(0,0,0,.15); text-align:center;
        }
        .inputForm { 
            height:56px; 
            border:2px solid #e0e0e0; 
            border-radius:12px; 
            padding:0 16px; 
            display:flex; 
            align-items:center; 
            margin-bottom:16px;
            background:white;
        }
        .inputForm:focus-within { 
            border-color:#2d79f3; 
            box-shadow:0 0 0 3px rgba(45,121,243,0.15);
        }
        .input { 
            width:100%; 
            height:100%; 
            border:none; 
            background:transparent; 
            font-size:16px; 
            color:#151717;
            outline:none;
        }
        .input::placeholder { color:#aaa; }
        .button-submit { 
            background:#151717; 
            color:white; 
            height:56px; 
            border-radius:12px; 
            font-weight:600; 
            font-size:16px;
            cursor:pointer; 
            width:100%; 
            margin:20px 0;
            border:none;
        }
        .button-submit:hover { background:#2d79f3; }
        .btn.google { 
            background:white; 
            border:2px solid #e0e0e0; 
            height:56px; 
            border-radius:12px; 
            display:flex; 
            align-items:center; 
            justify-content:center; 
            gap:12px; 
            cursor:pointer; 
            width:100%; 
            font-weight:600;
            color:#151717;
        }
        .btn.google:hover { border-color:#2d79f3; }
        .error { color:#e74c3c; background:#fff5f5; padding:12px; border-radius:8px; text-align:center; margin:10px 0; }
        .toggle-link { color:#2d79f3; cursor:pointer; font-weight:600; }

        .bottom-nav {
            position:fixed; bottom:0; left:0; right:0; height:80px; background:rgba(0,0,0,0.9); backdrop-filter:blur(20px);
            display:flex; align-items:center; justify-content:center; z-index:9999; padding-bottom:env(safe-area-inset-bottom);
        }
        .nav-container {
            background:rgba(255,255,255,0.1); backdrop-filter:blur(20px); border-radius:50px; padding:12px 30px;
            display:flex; gap:40px; box-shadow:0 8px 32px rgba(0,0,0,0.5);
        }
        .nav-item { display:flex; flex-direction:column; align-items:center; gap:6px; color:#888; font-size:11px; font-weight:600; cursor:pointer; }
        .nav-item i { font-size:24px; }
        .nav-item.active, .nav-item.active i { color:var(--coral); transform:scale(1.15); }

        .main-content {
            flex:1;
            padding:20px;
            padding-top:80px;
            padding-bottom:100px;
            display:flex;
            flex-direction:column;
            align-items:center;
        }
        .logo { 
            font-size: clamp(2.5rem, 8vw, 4rem); 
            font-weight:900; 
            background:linear-gradient(45deg,#fff,#ff8fa3); 
            -webkit-background-clip:text; 
            color:transparent; 
            text-align:center; 
            margin:20px 0; 
            cursor:pointer;
        }
        .glass { 
            background:rgba(255,255,255,0.15); 
            backdrop-filter:blur(20px); 
            border-radius:32px; 
            padding:30px; 
            margin:20px 0; 
            width:100%;
            max-width:600px;
        }
        .form-grid { display:grid; gap:16px; width:100%; }
        input, textarea, button { padding:16px; border-radius:16px; border:none; font-size:16px; }
        input, textarea { background:rgba(255,255,255,0.25); color:white; backdrop-filter:blur(10px); width:100%; }
        input::placeholder, textarea::placeholder { color:rgba(255,255,255,0.7); }
        button { background:var(--coral); color:white; font-weight:bold; cursor:pointer; width:100%; }
        button:disabled { background:#888; cursor:not-allowed; }
        .services { display:grid; grid-template-columns:1fr; gap:24px; margin-top:20px; width:100%; }
        .card { background:rgba(255,255,255,0.15); border-radius:24px; padding:20px; position:relative; width:100%; }
        .edit, .delete { position:absolute; top:10px; right:10px; background:#ffeb3b; color:black; width:36px; height:36px; border-radius:50%; display:grid; place-items:center; cursor:pointer; font-size:20px; opacity:0; transition:opacity 0.3s; }
        .delete { background:red; color:white; right:60px; }
        .card:hover .edit, .card:hover .delete { opacity:1; }
        .private { filter:blur(6px); user-select:none; transition: filter 0.3s; font-weight: 500; }
        .private:hover, .private:focus { filter:none; }
        .photos img { width:100%; max-width:280px; border-radius:12px; margin:8px 0; }
        .links { margin-top:15px; display:flex; flex-wrap:wrap; gap:10px; }
        .links a { color:var(--coral); text-decoration:none; font-weight:600; padding:8px 14px; background:rgba(255,255,255,0.1); border-radius:20px; display:flex; align-items:center; gap:6px; }

        .social-input { display:flex; gap:10px; margin-bottom:10px; align-items:center; }
        .social-input select, .social-input input { flex:1; padding:16px; border-radius:16px; border:none; font-size:16px; background:rgba(255,255,255,0.25); color:white; }
        .social-input button { flex:0 0 50px; height:50px; background:#0d9488; color:white; font-size:24px; border:none; border-radius:16px; cursor:pointer; display:grid; place-items:center; }

        .added-link { 
            display:flex; align-items:center; gap:10px; margin-bottom:8px; background:rgba(255,255,255,0.1); padding:10px; border-radius:16px; 
        }
        .added-link i { font-size:20px; }
        .added-link button { background:red; color:white; border:none; border-radius:50%; width:30px; height:30px; cursor:pointer; }

        .premium-option {
            background:rgba(255,255,255,0.1);
            padding:20px;
            border-radius:16px;
            margin:20px 0;
            text-align:center;
        }
        .premium-option label {
            display:flex; align-items:center; justify-content:center; gap:12px; cursor:pointer; font-size:1.1rem;
        }

        @media (max-width: 768px) {
            .nav-container { gap:30px; padding:10px 20px; }
            .form-grid { padding:0 10px; }
            .services { grid-template-columns:1fr; }
            .edit, .delete { opacity:1; }
            .social-input { flex-direction:column; }
            .social-input button { height:50px; width:100%; }
            input, textarea { font-size:16px !important; }
            .main-content { padding:15px; padding-top:70px; padding-bottom:90px; }
            .glass { padding:20px; }
        }
    </style>
</head>
<body>

<!-- LOGIN / SIGN UP -->
<div id="loginScreen" class="login-container">
    <div class="form">
        <h2 style="margin-bottom:30px; color:#151717;" id="formTitle">Iniciar Sesión</h2>

        <form id="authForm">
            <div class="inputForm">
                <input id="email" placeholder="Tu email" class="input" type="email" required>
            </div>

            <div class="inputForm">
                <input id="password" placeholder="Tu contraseña" class="input" type="password" required>
            </div>

            <button type="submit" class="button-submit" id="authButton">Entrar</button>
        </form>

        <div id="message"></div>

        <p style="margin-top:20px; color:#666;">
            <span id="toggleText">¿No tienes cuenta?</span> 
            <span class="toggle-link" onclick="toggleAuthMode()">Regístrate aquí</span>
        </p>

        <div style="margin-top:20px;">
            <button type="button" class="btn google" id="googleBtn">
                <svg width="20" height="20" viewBox="0 0 512 512" fill="currentColor">
                    <path d="M113.47,309.408L95.648,375.94l-65.139,1.378C11.042,341.211,0,299.9,0,256 c0-42.451,10.324-82.483,28.624-117.732h0.014l57.992,10.632l25.404,57.644c-5.317,15.501-8.215,32.141-8.215,49.456 C103.821,274.792,107.225,292.797,113.47,309.408z" style="fill:#FBBB00;"></path>
                    <path d="M507.527,208.176C510.467,223.662,512,239.655,512,256c0,18.328-1.927,36.206-5.598,53.451 c-12.462,58.683-45.025,109.925-90.134,146.187l-0.014-0.014l-73.044-3.727l-10.338-64.535 c29.932-17.554,53.324-45.025,65.646-77.911h-136.89V208.176h138.887L507.527,208.176z" style="fill:#518EF8;"></path>
                    <path d="M416.253,455.624l0.014,0.014C372.396,490.901,316.666,512,256,512 c-97.491,0-182.252-54.491-225.491-134.681l82.961-67.91c21.619,57.698,77.278,98.771,142.53,98.771 c28.047,0,54.323-7.582,76.87-20.818L416.253,455.624z" style="fill:#28B446;"></path>
                    <path d="M419.404,58.936l-82.933,67.896c-23.335-14.586-50.919-23.012-80.471-23.012 c-66.729,0-123.429,42.957-143.965,102.724l-83.397-68.276h-0.014C71.23,56.123,157.06,0,256,0 C318.115,0,375.068,22.126,419.404,58.936z" style="fill:#F14336;"></path>
                </svg>
                Continuar con Google
            </button>
        </div>
    </div>
</div>

<!-- DASHBOARD -->
<div id="dashboardScreen" style="display:none;">
    <div class="bottom-nav">
        <div class="nav-container">
            <div class="nav-item active" onclick="show('home')"><i class="fas fa-home"></i><span>Mis Servicios</span></div>
            <div class="nav-item" onclick="show('add')"><i class="fas fa-plus-circle"></i><span>Nuevo</span></div>
            <div class="nav-item" onclick="window.location.href='https://truewebx.site/'"><i class="fas fa-globe"></i><span>Pública</span></div>
            <div class="nav-item" onclick="logoutAndGoHome()"><i class="fas fa-sign-out-alt"></i><span>Salir</span></div>
        </div>
    </div>

    <div class="main-content">
        <h1 class="logo" onclick="window.location.href='https://truewebx.site/'">TrueWebX</h1>
        <p style="text-align:center; margin-bottom:30px;" id="welcomeMsg"></p>

        <div id="home" class="glass">
            <h2>Mis Servicios Publicados</h2>
            <div class="services" id="list"></div>
        </div>

        <div id="add" class="glass" style="display:none;">
            <h2>Publicar Nuevo Servicio</h2>
            <div class="form-grid">
                <input type="text" id="name" placeholder="Nombre completo" required>
                <input type="text" id="city" placeholder="Ciudad y País" required>
                <input type="tel" id="phone" placeholder="Teléfono" required>
                <input type="email" id="gmail" placeholder="Gmail" required>
                <input type="text" id="price" placeholder="Precio (opcional)">
                <textarea id="desc" placeholder="Descripción detallada" required></textarea>
                <input type="file" id="profile" accept="image/*" required>
                <input type="file" id="photos" accept="image/*" multiple>

                <div id="social-container">
                    <h3 style="color:white; margin:20px 0 10px;">Redes Sociales (opcional)</h3>
                    <div class="social-input">
                        <select id="social-type">
                            <option value="instagram">Instagram</option>
                            <option value="tiktok">TikTok</option>
                            <option value="facebook">Facebook</option>
                            <option value="twitter">X (Twitter)</option>
                            <option value="linkedin">LinkedIn</option>
                            <option value="youtube">YouTube</option>
                            <option value="whatsapp">WhatsApp</option>
                            <option value="other">Otro</option>
                        </select>
                        <input type="url" id="social-url" placeholder="URL completa (ej: https://instagram.com/tuusuario)">
                        <button type="button" onclick="addSocialLink()">+</button>
                    </div>
                    <div id="added-socials" style="margin-top:10px;"></div>
                </div>

                <!-- OPCIÓN PREMIUM -->
                <div class="premium-option">
                    <label>
                        <input type="checkbox" id="premiumListing">
                        <span>✨ Hacer este listing PREMIUM ($9.99/mes) – Aparece primero, badge destacado y más visibilidad</span>
                    </label>
                </div>

                <button id="publishBtn" onclick="addService()">PUBLICAR AHORA</button>
            </div>
            <p id="msg"></p>
        </div>

        <!-- EDITAR (mantiene tu código actual) -->
        <div id="edit" class="glass" style="display:none;">
            <!-- Tu sección de editar actual -->
            <h2>Editar Servicio</h2>
            <div class="form-grid">
                <!-- ... todos tus inputs de editar ... -->
            </div>
            <p id="edit-msg"></p>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAHZ5v86FWK9uU-9LfZKaBsMR6QQ92JqQM",
        authDomain: "truewebx-78890.firebaseapp.com",
        projectId: "truewebx-78890",
        storageBucket: "truewebx-78890.firebasestorage.app",

    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    const SUPABASE_URL = 'https://vrpyomevjlsacourdmki.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_CyhH7Cwymoqf2fxdNj6D1Q_NHl6TmTV';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // TU PUBLISHABLE KEY DE STRIPE (pública, es segura mostrarla)
    const stripe = Stripe('pk_test_51YOURPUBLISHABLEKEYHERE'); // ← Cambia por tu pk_test_...

    // TU PRICE ID DE STRIPE (crea un producto de $9.99/mes en Stripe Dashboard)
    const PREMIUM_PRICE_ID = 'price_1YOURPRICEIDHERE'; // ← Cambia por tu price_...

    const list = document.getElementById('list');
    const msg = document.getElementById('msg');
    const welcomeMsg = document.getElementById('welcomeMsg');
    let currentEditId = null;
    let currentSocialLinks = [];
    let isSignupMode = false;
    let isPublishing = false;

    // ... (todo tu código actual de auth, loadDashboard, show, addSocialLink, etc. permanece igual)

    async function addService() {
        if (isPublishing) return;

        const name = document.getElementById('name').value.trim();
        const city = document.getElementById('city').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const gmail = document.getElementById('gmail').value.trim();
        const price = document.getElementById('price').value.trim();
        const desc = document.getElementById('desc').value.trim();
        const profileFile = document.getElementById('profile').files[0];
        const isPremium = document.getElementById('premiumListing').checked;

        if (!name || !city || !phone || !gmail || !desc || !profileFile) {
            msg.innerHTML = '<p style="color:red;">¡Todos los campos son obligatorios excepto el precio!</p>';
            return;
        }

        if (isPremium) {
            // Redirigir a Stripe Checkout
            msg.innerHTML = '<p style="color:#0f0;">Redirigiendo a pago seguro con Stripe...</p>';
            const { error } = await stripe.redirectToCheckout({
                lineItems: [{ price: PREMIUM_PRICE_ID, quantity: 1 }],
                mode: 'subscription',
                successUrl: window.location.origin + '/dashboard.html?premium=success',
                cancelUrl: window.location.origin + '/dashboard.html?premium=cancel',
                clientReferenceId: auth.currentUser.uid,
                customerEmail: auth.currentUser.email
            });

            if (error) {
                msg.innerHTML = '<p style="color:red;">Error con Stripe: ' + error.message + '</p>';
            }
            return;
        }

        // Publicación gratis (tu código actual)
        isPublishing = true;
        const publishBtn = document.getElementById('publishBtn');
        publishBtn.disabled = true;
        publishBtn.textContent = 'PUBLICANDO...';

        // ... (tu código actual de subir imágenes y guardar en Supabase) ...

        setTimeout(() => {
            isPublishing = false;
            publishBtn.disabled = false;
            publishBtn.textContent = 'PUBLICAR AHORA';
        }, 5000);
    }

    // ... (resto de tus funciones: editService, updateService, deleteService, etc.)
</script>
</body>
</html>
