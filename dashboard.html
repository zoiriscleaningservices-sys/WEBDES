<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrueWebX – My Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* (Same styles as before – kept for brevity, copy from your original dashboard.html) */
        :root { --coral: #ff6b6b; --turquoise: #0d9488; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: system-ui, sans-serif; background: linear-gradient(135deg, var(--turquoise), var(--coral)); color:white; min-height:100vh; display:flex; flex-direction:column; }
        /* ... (keep all your existing styles) ... */

        /* Messages Tab Styles */
        .chat-list { display:grid; gap:16px; }
        .chat-item { background:rgba(255,255,255,0.15); border-radius:20px; padding:16px; cursor:pointer; transition:0.3s; }
        .chat-item:hover { background:rgba(255,255,255,0.25); transform:translateY(-4px); }
        .chat-item.unread { border-left:4px solid var(--coral); }
        .chat-preview { opacity:0.9; font-size:0.95rem; margin-top:6px; }

        .chat-window { display:flex; flex-direction:column; height:70vh; }
        .chat-header { padding:16px; border-bottom:1px solid rgba(255,255,255,0.2); text-align:center; font-size:1.3rem; }
        .chat-body { flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:12px; }
        .message { max-width:80%; padding:12px 18px; border-radius:20px; line-height:1.4; }
        .message.client { align-self:flex-end; background:var(--coral); color:white; }
        .message.owner { align-self:flex-start; background:rgba(255,255,255,0.3); }
        .chat-input { display:flex; padding:16px; border-top:1px solid rgba(255,255,255,0.2); gap:10px; }
        .chat-input input { flex:1; padding:14px; border-radius:50px; border:none; background:rgba(255,255,255,0.2); color:white; }
        .chat-input button { width:50px; height:50px; border-radius:50%; background:var(--coral); color:white; border:none; font-size:1.4rem; cursor:pointer; }
    </style>
</head>
<body>
<!-- LOGIN SCREEN (same as before) -->
<div id="loginScreen" class="login-container"> ... </div>

<!-- DASHBOARD -->
<div id="dashboardScreen" style="display:none;">
    <div class="bottom-nav">
        <div class="nav-container">
            <div class="nav-item active" onclick="showSection('home')"><i class="fas fa-home"></i><span>My Services</span></div>
            <div class="nav-item" onclick="showSection('add')"><i class="fas fa-plus-circle"></i><span>New</span></div>
            <div class="nav-item" onclick="showSection('messages')"><i class="fas fa-envelope"></i><span>Messages</span></div>
            <div class="nav-item" onclick="window.location.href='index.html'"><i class="fas fa-globe"></i><span>Public</span></div>
            <div class="nav-item" onclick="logoutAndGoHome()"><i class="fas fa-sign-out-alt"></i><span>Sign Out</span></div>
        </div>
    </div>

    <div class="main-content">
        <h1 class="logo">TrueWebX</h1>
        <p style="text-align:center; margin-bottom:30px;" id="welcomeMsg"></p>

        <!-- Existing sections: home, add, edit (keep your original code) -->
        <div id="home" class="glass"> ... </div>
        <div id="add" class="glass" style="display:none;"> ... </div>
        <div id="edit" class="glass" style="display:none;"> ... </div>

        <!-- NEW: Messages Section -->
        <div id="messages" class="glass" style="display:none;">
            <h2>Inbox</h2>
            <div id="chatList" class="chat-list"></div>

            <div id="chatWindow" class="glass" style="display:none; margin-top:20px;">
                <div class="chat-header" id="chatHeader">Chat with Client</div>
                <div class="chat-body" id="chatBody"></div>
                <div class="chat-input">
                    <input type="text" id="replyInput" placeholder="Type your reply...">
                    <button onclick="sendReply()"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Firebase & Supabase init (same as before)
    const firebaseConfig = { /* your config */ };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    const SUPABASE_URL = 'https://vrpyomevjlsacourdmki.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_CyhH7Cwymoqf2fxdNj6D1Q_NHl6TmTV';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentChatServiceId = null;

    // ... (keep all your existing auth, publish, edit, delete code) ...

    function showSection(section) {
        document.querySelectorAll('#home, #add, #edit, #messages').forEach(el => el.style.display = 'none');
        document.getElementById(section).style.display = 'block';
        document.querySelectorAll('.nav-item').forEach((n, i) => n.classList.remove('active'));
        document.querySelectorAll('.nav-item')[section === 'home' ? 0 : section === 'add' ? 1 : section === 'messages' ? 2 : 3].classList.add('active');

        if (section === 'messages') loadInbox();
        if (section === 'home') loadDashboard();
    }

    async function loadInbox() {
        const user = auth.currentUser;
        if (!user) return;

        const { data: services } = await supabaseClient
            .from('services')
            .select('id, name')
            .eq('owner_id', user.uid);

        const serviceIds = services.map(s => s.id);

        const { data: messages } = await supabaseClient
            .from('messages')
            .select('service_id, text, created_at, is_from_owner')
            .in('service_id', serviceIds)
            .order('created_at', { ascending: false });

        const chats = {};
        messages.forEach(m => {
            if (!chats[m.service_id]) {
                chats[m.service_id] = {
                    serviceName: services.find(s => s.id === m.service_id)?.name || 'Unknown',
                    lastMessage: m.text,
                    timestamp: m.created_at,
                    unread: !m.is_from_owner
                };
            }
        });

        const list = document.getElementById('chatList');
        list.innerHTML = Object.keys(chats).length ? Object.entries(chats).map(([id, chat]) => `
            <div class="chat-item ${chat.unread ? 'unread' : ''}" onclick="openChat('${id}', '${chat.serviceName.replace(/'/g, "\\'")}')">
                <strong>${chat.serviceName}</strong>
                <div class="chat-preview">${chat.lastMessage}</div>
                <small>${new Date(chat.timestamp).toLocaleString()}</small>
            </div>
        `).join('') : '<p style="text-align:center; opacity:0.8;">No messages yet</p>';
    }

    async function openChat(serviceId, serviceName) {
        currentChatServiceId = serviceId;
        document.getElementById('chatHeader').textContent = `Chat – ${serviceName}`;
        document.getElementById('chatWindow').style.display = 'block';
        loadChatMessages();

        // Realtime subscription
        supabaseClient
            .channel('messages')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages', filter: `service_id=eq.${serviceId}` }, payload => {
                if (!payload.new.is_from_owner) loadChatMessages();
            })
            .subscribe();
    }

    async function loadChatMessages() {
        const { data } = await supabaseClient
            .from('messages')
            .select('*')
            .eq('service_id', currentChatServiceId)
            .order('created_at', { ascending: true });

        const body = document.getElementById('chatBody');
        body.innerHTML = data.map(m => `
            <div class="message ${m.is_from_owner ? 'owner' : 'client'}">
                ${m.text}
                <small style="display:block;margin-top:6px;opacity:0.7;font-size:0.8em;">
                    ${new Date(m.created_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}
                </small>
            </div>
        `).join('');

        body.scrollTop = body.scrollHeight;
    }

    async function sendReply() {
        const input = document.getElementById('replyInput');
        const text = input.value.trim();
        if (!text || !currentChatServiceId) return;

        await supabaseClient.from('messages').insert({
            service_id: currentChatServiceId,
            text,
            is_from_owner: true,
            created_at: new Date().toISOString()
        });

        input.value = '';
        loadChatMessages();
    }

    document.getElementById('replyInput')?.addEventListener('keypress', e => {
        if (e.key === 'Enter') sendReply();
    });

    // Load dashboard on auth
    auth.onAuthStateChanged(user => {
        if (user) loadDashboard(user);
    });
</script>
</body>
</html>
