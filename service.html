<!DOCTYPE html>
<html lang="en">
<head>
  <!-- (Keep all your <meta>, <link>, <style> exactly as before) -->
</head>
<body>

  <div class="container" id="content">
    <div class="loading">
      <i class="fas fa-spinner fa-spin"></i>
      <br>Loading your business profile...
    </div>
  </div>

  <script type="application/ld+json" id="structuredData">{}</script>

  <script>
    const supabase = supabase.createClient('https://vrpyomevjlsacourdmki.supabase.co', 'sb_publishable_CyhH7Cwymoqf2fxdNj6D1Q_NHl6TmTV');

    async function loadServicePage() {
      console.log('Starting load...'); // Debug

      const params = new URLSearchParams(window.location.search);
      const serviceId = params.get('id');
      const content = document.getElementById('content');

      if (!serviceId) {
        content.innerHTML = '<div class="not-found"><h2>Invalid Link</h2><p>No ID provided.</p></div>';
        return;
      }

      console.log('Fetching ID:', serviceId); // Debug

      const { data: service, error } = await supabase
        .from('services')
        .select('*')
        .eq('id', serviceId)
        .single();

      console.log('Data:', service, 'Error:', error); // Debug - check browser console (F12)

      if (error || !service) {
        content.innerHTML = `
          <div class="not-found">
            <i class="fas fa-search"></i>
            <h2>Business Profile Not Found</h2>
            <p>This listing may have been removed.</p>
            <div class="back-home"><a href="https://truewebx.site/">← Back to Directory</a></div>
          </div>
        `;
        return;
      }

      // This will now ALWAYS run and replace loading
      const currentUrl = window.location.href;

      document.title = `${service.name} - ${service.city} | TrueWebX`;

      // (Keep all your SEO updates here...)

      content.innerHTML = `
        <!-- Full profile render code here (same as before) -->
        <div class="logo" onclick="window.location.href='https://truewebx.site/'">TrueWebX</div>
        <img src="${service.profile}" alt="${service.name} logo" class="profile-img">
        <h1>${service.name}</h1>
        <div class="location"><i class="fas fa-map-marker-alt"></i> ${service.city}</div>
        <div class="description">${service.description.replace(/\n/g, '<br>')}</div>
        <!-- Contact, gallery, social, buttons, footer... -->
      `;
      console.log('Profile rendered!'); // Debug
    }

    loadServicePage();
  </script>
</body>
</html>
