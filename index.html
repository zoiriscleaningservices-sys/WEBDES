<!DOCTYPE html>

<head>

  <style>
    :root{--gold:#FFD700;--red:#DC2626;--dark:#0F0F0F;--card:rgba(15,15,15,0.8);--text:#F3F4F6;}

<body>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav"><span class="navbar-toggler-icon"></span></button>

      <ul class="navbar-nav me-auto">

<section class="hero py-5">
  <div class="container">
    <div class="row align-items-center">
      <div class="col-lg-6 text-center text-lg-start">
        <span class="badge bg-warning text-dark px-4 py-2 rounded-pill mb-4">Cheapest SMM Panel 2025</span>
        <h1 class="display-3 fw-bold mb-4">Grow Your Social Media <br>with <span style="color:var(--gold)">TrueWebX</span></h1>
        <p class="lead mb-4">Instant Telegram members • Instagram followers • YouTube views • TikTok likes<br>Trusted by 100K+ resellers since 2021 • API ready</p>
        <div class="d-flex gap-3 justify-content-center justify-content-lg-start">

          <form id="emailLoginForm">
            <input type="email" id="email" class="form-control form-control-lg mb-3 rounded-pill" placeholder="Email" required>

<!-- Services, Pricing, Footer sections (same as before) -->
<!-- You can keep everything else from the previous code -->

<!-- Firebase SDKs -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
  import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-analytics.js";
  import { 
    getAuth, 
    signInWithEmailAndPassword, 
    createUserWithEmailAndPassword,
    signInWithPopup, 
    GoogleAuthProvider, 
    onAuthStateChanged, 
    signOut 
  } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAHZ5v86FWK9uU-9LfZKaBsMR6QQ92JqQM",
    authDomain: "truewebx-78890.firebaseapp.com",
    projectId: "truewebx-78890",
    storageBucket: "truewebx-78890.firebasestorage.app",
    messagingSenderId: "578628752073",
    appId: "1:578628752073:web:c916cc3f234865a2947318",
    measurementId: "G-0RVDLJX2LD"
  };

  const app = initializeApp(firebaseConfig);
  const analytics = getAnalytics(app);
  const auth = getAuth(app);
  const provider = new GoogleAuthProvider();

  // Check login state on load
  onAuthStateChanged(auth, (user) => {
    if (user) {
      document.getElementById("authButtons").style.display = "none";
      document.getElementById("logoutBtn").style.display = "inline-block";
      document.getElementById("dashboardBtn").style.display = "inline-block";
      document.getElementById("msg").innerHTML = `<div class="alert alert-success">Welcome ${user.displayName || user.email}!</div>`;
    } else {
      document.getElementById("authButtons").style.display = "";
      document.getElementById("logoutBtn").style.display = "none";
      document.getElementById("dashboardBtn").style.display = "none";
    }
  });

  // Email Login
  document.getElementById("emailLoginForm").addEventListener("submit", (e) => {
    e.preventDefault();
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    signInWithEmailAndPassword(auth, email, password)
      .then(() => location.reload())
      .catch((err) => {
        document.getElementById("msg").innerHTML = `<div class="alert alert-danger">${err.message}</div>`;
      });
  });

  // Google Sign-In (also works as Sign-Up)
  window.googleSignIn = () => {
    signInWithPopup(auth, provider)
      .then(() => location.reload())
      .catch((err) => {
        document.getElementById("msg").innerHTML = `<div class="alert alert-danger">${err.message}</div>`;
      });
  };

  // Logout
  document.getElementById("logoutBtn").addEventListener("click", () => {
    signOut(auth).then(() => location.reload());
  });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
