<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In</title>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

  <style>
    /* From Uiverse.io by JohnnyCSilva */
    body {margin:0;padding:0;background:#f5f7fa;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,Cantarell,'Open Sans','Helvetica Neue',sans-serif;}
    .form {display:flex;flex-direction:column;gap:10px;background-color:#ffffff;padding:30px;width:450px;border-radius:20px;box-shadow:0 10px 40px rgba(0,0,0,.08);}
    ::placeholder {font-family:inherit;}
    .flex-column > label {color:#151717;font-weight:600;}
    .inputForm {border:1.5px solid #ecedec;border-radius:10px;height:50px;display:flex;align-items:center;padding-left:10px;transition:.2s ease-in-out;}
    .input {margin-left:10px;border:none;width:100%;height:100%;background:transparent;font-size:15px;}
    .input:focus {outline:none;}
    .inputForm:focus-within {border:1.5px solid #2d79f3;}
    .flex-row {display:flex;flex-direction:row;align-items:center;gap:10px;justify-content:space-between;}
    .flex-row > div > label {font-size:14px;color:black;font-weight:400;}
    .span {font-size:14px;color:#2d79f3;font-weight:500;cursor:pointer;}
    .button-submit {margin:20px 0 10px;background-color:#151717;border:none;color:white;font-size:15px;font-weight:500;border-radius:10px;height:50px;width:100%;cursor:pointer;transition:.3s;}
    .button-submit:hover {background:#2d79f3;}
    .button-submit:disabled {background:#999;cursor:not-allowed;}
    .p {text-align:center;color:black;font-size:14px;margin:5px 0;}
    .p.line {color:#aaa;}
    .btn {margin-top:10px;width:100%;height:50px;border-radius:10px;display:flex;justify-content:center;align-items:center;font-weight:500;gap:10px;border:1px solid #ededef;background:white;cursor:pointer;transition:.2s;}
    .btn:hover {border:1px solid #2d79f3;}
    .error {color:#e74c3c;text-align:center;font-size:13px;margin-top:10px;padding:10px;background:#fff5f5;border-radius:8px;}
    .success {color:#27ae60;text-align:center;font-size:13px;margin-top:10px;}

    /* Beautiful Forgot Password Modal */
    #forgotModal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }
    #forgotModal .box {
      background: #fff;
      padding: 30px;
      border-radius: 20px;
      width: 420px;
      text-align: center;
      box-shadow: 0 10px 40px rgba(0,0,0,.15);
    }
    #forgotModal input {
      width: 100%;
      height: 50px;
      border: 1.5px solid #ecedec;
      border-radius: 10px;
      padding: 0 15px;
      font-size: 15px;
      margin: 15px 0 0 0;
    }
    #forgotModal input:focus {outline:none;border-color:#2d79f3;}
    #forgotModal .buttons {
      margin-top: 20px;
      display: flex;
      gap: 12px;
      justify-content: center;
    }
    #forgotModal button {
      padding: 10px 25px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 500;
    }
    #cancelBtn {background:#f1f1f1;color:#333;}
    #sendBtn {background:#151717;color:white;}
    #sendBtn:hover {background:#2d79f3;}
  </style>
</head>
<body>

<!-- EXACT ORIGINAL STRUCTURE -->
<form class="form" id="loginForm">
  <div class="flex-column"><label>Email </label></div>
  <div class="inputForm">
    <svg xmlns="http://www.w3.org/2000/svg" width="20" viewBox="0 0 32 32" height="20"><g data-name="Layer 3" id="Layer_3"><path d="m30.853 13.87a15 15 0 0 0 -29.729 4.082 15.1 15.1 0 0 0 12.876 12.918 15.6 15.6 0 0 0 2.016.13 14.85 14.85 0 0 0 7.715-2.145 1 1 0 1 0 -1.031-1.711 13.007 13.007 0 1 1 5.458-6.529 2.149 2.149 0 0 1 -4.158-.759v-10.856a1 1 0 0 0 -2 0v1.726a8 8 0 1 0 .2 10.325 4.135 4.135 0 0 0 7.83.274 15.2 15.2 0 0 0 .823-7.455zm-14.853 8.13a6 6 0 1 1 6-6 6.006 6.006 0 0 1 -6 6z"></path></g></svg>
    <input id="email" placeholder="Enter your Email" class="input" type="email" required>
  </div>

  <div class="flex-column"><label>Password </label></div>
  <div class="inputForm">
    <svg xmlns="http://www.w3.org/2000/svg" width="20" viewBox="-64 0 512 512" height="20"><path d="m336 512h-288c-26.453125 0-48-21.523438-48-48v-224c0-26.476562 21.546875-48 48-48h288c26.453125 0 48 21.523438 48 48 48v224c0 26.476562-21.546875 48-48 48zm-288-288c-8.8125 0-16 7.167969-16 16v224c0 8.832031 7.1875 16 16 16h288c8.8125 0 16-7.167969 16-16v-224c0-8.832031-7.1875-16-16-16zm0 0"></path><path d="m304 224c-8.832031 0-16-7.167969-16-16v-80c0-52.929688-43.070312-96-96-96s-96 43.070312-96 96v80c0 8.832031-7.167969 16-16 16s-16-7.167969-16-16v-80c0-70.59375 57.40625-128 128-128s128 57.40625 128 128v80c0 8.832031-7.167969 16-16 16zm0 0"></path></svg>        
    <input id="password" placeholder="Enter your Password" class="input" type="password" required>
  </div>

  <div class="flex-row">
    <div>
      <input type="checkbox" id="remember" checked>
      <label>Remember me </label>
    </div>
    <span class="span" id="forgot">Forgot password?</span>
  </div>

  <button type="submit" class="button-submit" id="loginBtn">Sign In</button>
  <div id="message"></div>

  <p class="p">Don't have an account? <span class="span" id="goSignup">Sign Up</span></p>
  <p class="p line">Or With</p>

  <div class="flex-row">
    <button type="button" class="btn google" id="googleBtn">
      <svg xml:space="preserve" style="enable-background:new 0 0 512 512;" viewBox="0 0 512 512" width="20" version="1.1">
        <path d="M113.47,309.408L95.648,375.94l-65.139,1.378C11.042,341.211,0,299.9,0,256 c0-42.451,10.324-82.483,28.624-117.732h0.014l57.992,10.632l25.404,57.644c-5.317,15.501-8.215,32.141-8.215,49.456 C103.821,274.792,107.225,292.797,113.47,309.408z" style="fill:#FBBB00;"></path>
        <path d="M507.527,208.176C510.467,223.662,512,239.655,512,256c0,18.328-1.927,36.206-5.598,53.451 c-12.462,58.683-45.025,109.925-90.134,146.187l-0.014-0.014l-73.044-3.727l-10.338-64.535 c29.932-17.554,53.324-45.025,65.646-77.911h-136.89V208.176h138.887L507.527,208.176L507.527,208.176z" style="fill:#518EF8;"></path>
        <path d="M416.253,455.624l0.014,0.014C372.396,490.901,316.666,512,256,512 c-97.491,0-182.252-54.491-225.491-134.681l82.961-67.91c21.619,57.698,77.278,98.771,142.53,98.771 c28.047,0,54.323-7.582,76.87-20.818L416.253,455.624z" style="fill:#28B446;"></path>
        <path d="M419.404,58.936l-82.933,67.896c-23.335-14.586-50.919-23.012-80.471-23.012 c-66.729,0-123.429,42.957-143.965,102.724l-83.397-68.276h-0.014C71.23,56.123,157.06,0,256,0 C318.115,0,375.068,22.126,419.404,58.936z" style="fill:#F14336;"></path>
      </svg>
      Google 
    </button>
  </div>
</form>

<!-- BEAUTIFUL FORGOT PASSWORD MODAL -->
<div id="forgotModal">
  <div class="box">
    <h3 style="margin:0 0 12px;color:#151717;">Forgot Password?</h3>
    <p style="color:#666;font-size:14px;margin:0 0 20px;">Enter your email and we'll send you a reset link.</p>
    <input type="email" id="resetEmail" placeholder="Enter your Email" required>
    <div class="buttons">
      <button id="cancelBtn">Cancel</button>
      <button id="sendBtn">Send Link</button>
    </div>
    <div id="modalMsg" style="margin-top:15px;font-size:13px;"></div>
  </div>
</div>

<script>
  const firebaseConfig = {
   apiKey: "AIzaSyAHZ5v86FWK9uU-9LfZKaBsMR6QQ92JqQM",
   authDomain: "truewebx-78890.firebaseapp.com",
   projectId: "truewebx-78890",
   storageBucket: "truewebx-78890.firebasestorage.app",
   messagingSenderId: "578628752073",
   appId: "1:578628752073:web:c916cc3f234865a2947318",
   measurementId: "G-0RVDLJX2LD"
 };

 firebase.initializeApp(firebaseConfig);
 const auth = firebase.auth();

 const message = document.getElementById('message');
 const loginBtn = document.getElementById('loginBtn');

 // CLEAN ERROR MESSAGES - no more raw Firebase codes
 function showError(text) {
   message.innerHTML = `<div class="error">${text}</div>`;
 }

 document.getElementById('loginForm').onsubmit = e => {
   e.preventDefault();
   loginBtn.disabled = true;
   loginBtn.textContent = 'Signing in...';

   const email = document.getElementById('email').value.trim();
   const password = document.getElementById('password').value;
   const remember = document.getElementById('remember').checked;

   auth.setPersistence(remember ? firebase.auth.Auth.Persistence.LOCAL : firebase.auth.Auth.Persistence.SESSION)
     .then(() => auth.signInWithEmailAndPassword(email, password))
     .then(() => location.href = 'dashboard.html')
     .catch(err => {
       // Friendly messages only
       if (err.code === 'auth/invalid-credential' || 
           err.code === 'auth/wrong-password' || 
           err.code === 'auth/user-not-found' ||
           err.code === 'auth/invalid-email') {
         showError('Incorrect email or password.');
       } else if (err.code === 'auth/too-many-requests') {
         showError('Too many attempts. Please try again later.');
       } else if (err.code === 'auth/network-request-failed') {
         showError('No internet connection.');
       } else {
         showError('Something went wrong. Please try again.');
       }
       loginBtn.disabled = false;
       loginBtn.textContent = 'Sign In';
     });
 };

 document.getElementById('googleBtn').onclick = () => {
   auth.signInWithPopup(new firebase.auth.GoogleAuthProvider())
     .then(() => location.href = 'dashboard.html')
     .catch(() => showError('Google sign-in failed.'));
 };

 document.getElementById('goSignup').onclick = () => location.href = 'signup.html';

 // FORGOT PASSWORD MODAL (unchanged, just cleaner messages)
 const modal = document.getElementById('forgotModal');
 const modalMsg = document.getElementById('modalMsg');

 document.getElementById('forgot').onclick = () => {
   modal.style.display = 'flex';
   document.getElementById('resetEmail').value = document.getElementById('email').value || '';
 };

 document.getElementById('cancelBtn').onclick = () => {
   modal.style.display = 'none';
   modalMsg.innerHTML = '';
 };

 document.getElementById('sendBtn').onclick = () => {
   const email = document.getElementById('resetEmail').value.trim();
   if (!email) {
     modalMsg.innerHTML = '<div class="error">Please enter your email</div>';
     return;
   }

   document.getElementById('sendBtn').textContent = 'Sending...';
   document.getElementById('sendBtn').disabled = true;

   auth.sendPasswordResetEmail(email)
     .then(() => {
       modalMsg.innerHTML = '<div class="success">Check your email!</div>';
       setTimeout(() => modal.style.display = 'none', 3000);
     })
     .catch(() => modalMsg.innerHTML = '<div class="error">Email not found</div>')
     .finally(() => {
       document.getElementById('sendBtn').textContent = 'Send Link';
       document.getElementById('sendBtn').disabled = false;
     });
 };

 modal.onclick = e => { if (e.target === modal) modal.style.display = 'none'; };

 // Auto redirect if already logged in
 auth.onAuthStateChanged(user => user && (location.href = 'dashboard.html'));
</script>
</body>
</html>
