<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso para Clientes - TrueWebX</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background"></div>
    <div class="main-container">
        <div class="welcome-content">
            <div class="badge">
                <i class="fa-solid fa-user-astronaut"></i>
                <span>Bienvenido a TrueWebX</span>
            </div>
            <h1>Tu Aventura Digital Comienza Aquí</h1>
            <p>Accede a tu cuenta para gestionar tus servicios y explorar todo lo que tenemos para ofrecer. Potencia tu presencia en línea con TrueWebX.</p>
        </div>
        <div class="login-card-wrapper">
            <div class="login-card" id="loginDiv">
                <h2>Acceso Seguro</h2>
                <form id="loginForm">
                    <div class="form-group">
                        <label for="email">Correo Electrónico</label>
                        <input type="email" class="form-control" id="email" name="email" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Contraseña</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    <button type="submit" class="btn-login">Iniciar Sesión</button>
                </form>
            </div>
        </div>
    </div>
    <script src="script.js" type="module"></script>
</body>
</html>
