<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrueWebX – Limpieza Digital</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Mismo estilo que antes -->
    <style>
        /* Copia todo tu <style> original aquí (el mismo CSS de siempre) */
        :root { --coral: #ff6b6b; --turquoise: #0d9488; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: system-ui, sans-serif; background: linear-gradient(135deg, var(--turquoise), var(--coral)); color:white; min-height:100vh; }
        .container { max-width:1200px; margin:0 auto; padding:20px; text-align:center; padding-top:60px; }
        .logo { font-size:3.5rem; font-weight:900; background:linear-gradient(45deg,#fff,#ff8fa3); -webkit-background-clip:text; color:transparent; }
        .glass { background:rgba(255,255,255,0.15); backdrop-filter:blur(20px); border-radius:32px; padding:40px; margin:40px 0; }
        .services { display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:24px; margin-top:40px; }
        .card { background:rgba(255,255,255,0.15); border-radius:24px; padding:20px; }
        .private { filter:blur(6px); user-select:none; }
        .private:hover { filter:none; }
        .photos img { width:100%; max-width:300px; border-radius:12px; margin:8px 0; }
    </style>
</head>
<body>
<div class="container">
    <h1 class="logo">TrueWebX – Limpieza Digital</h1>
    <p>Marketplace mundial de servicios de limpieza</p>

    <div class="glass">
        <h2>Servicios disponibles</h2>
        <div class="services" id="list"></div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://vrpyomevjlsacourdmki.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_CyhH7Cwymoqf2fxdNj6D1Q_NHl6TmTV';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function loadServices() {
        const { data: services } = await supabaseClient.from('services').select('*').order('created_at', { ascending: false });
        const list = document.getElementById('list');
        list.innerHTML = services.length === 0 
            ? '<p>No hay servicios disponibles aún.</p>'
            : services.map(s => `
                <div class="card">
                    <img src="${s.profile}" style="width:100%;max-width:300px;border-radius:16px;margin:10px 0;">
                    <h3>${s.name}</h3>
                    <p><strong>${s.city}</strong></p>
                    <p>${s.desc}</p>
                    <div class="photos">${s.photos.map(p => `<img src="${p}">`).join('')}</div>
                    <p>Tel: <span class="private">${s.phone}</span></p>
                    <p>Email: <span class="private">${s.email}</span></p>
                    <p style="font-size:1.8rem;color:var(--coral);"><strong>${s.price}</strong></p>
                </div>
            `).join('');
    }

    loadServices();
</script>
</body>
</html>
