<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrueWebX – Servicios Globales</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Your original style from the first index.html you gave me */
        :root { 
            --coral: #ff6b6b; 
            --turquoise: #0d9488; 
            --white: #ffffff;
            --light-glass: rgba(255, 255, 255, 0.22);
            --card-glass: rgba(255, 255, 255, 0.25);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { 
            font-family: system-ui, -apple-system, sans-serif; 
            background: linear-gradient(135deg, var(--turquoise), var(--coral)); 
            color: var(--white); 
            min-height: 100vh; 
        }
        /* ... rest of your original CSS ... */
        /* (copy all your original style from the first message) */
    </style>
</head>
<body>
    <!-- Your original HTML structure -->
    <div class="container">
        <div class="header-wrapper" id="header">
            <h1 class="logo">TrueWebX</h1>
            <button class="login-btn" onclick="window.location.href='dashboard.html'">
                <i class="fas fa-user-circle"></i> Login / Sign Up
            </button>
        </div>

        <div class="main-content">
            <div class="hero">
                <div class="tagline">Promueve tu Negocio en Todo el Mundo</div>
                <p class="subtitle">
                    Plataforma todo-en-uno para publicar, crecer y conectar tu negocio con clientes globales.<br>
                    <strong>Todo lo que necesitas para destacar</strong>
                </p>
            </div>

            <div class="search-container">
                <input type="text" id="searchInput" class="search-box" placeholder="Buscar por nombre o ciudad...">
                <i class="fas fa-search search-icon"></i>
            </div>

            <div class="glass">
                <h2>Servicios Disponibles en Todo el Mundo</h2>
                <div class="services" id="list"></div>
            </div>
        </div>
    </div>

    <script>
        const supabase = supabase.createClient('https://vrpyomevjlsacourdmki.supabase.co', 'sb_publishable_CyhH7Cwymoqf2fxdNj6D1Q_NHl6TmTV');

        let allServices = [];

        async function loadServices() {
            const { data: services } = await supabase.from('services').select('*').order('created_at', { ascending: false });
            allServices = services || [];
            renderServices(allServices);
        }

        function renderServices(services) {
            const list = document.getElementById('list');
            if (services.length === 0) {
                list.innerHTML = '<p class="no-services">Aún no hay servicios publicados.</p>';
                return;
            }

            list.innerHTML = services.map(s => `
                <a href="service.html?slug=${s.slug}" class="card">
                    <img src="${s.profile}" alt="${s.name}">
                    <h3>${s.name}</h3>
                    <p><strong>${s.city}</strong></p>
                    <p>${s.description || 'Sin descripción'}</p>
                    <p class="price">${s.price || 'Consultar precio'}</p>
                </a>
            `).join('');
        }

        document.getElementById('searchInput').addEventListener('input', e => {
            const query = e.target.value.toLowerCase();
            const filtered = allServices.filter(s => 
                s.name.toLowerCase().includes(query) || 
                s.city.toLowerCase().includes(query)
            );
            renderServices(filtered);
        });

        loadServices();
    </script>
</body>
</html>
